name: Release Loomle Skill

on:
  workflow_dispatch:
  push:
    tags:
      - "skill-v*"

permissions:
  contents: write

jobs:
  release-loomle-skill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package Skill
        id: package
        shell: bash
        run: |
          set -euo pipefail
          release_dir="$RUNNER_TEMP/release-skill-assets"
          zip_path="$release_dir/loomle-skill.zip"
          version_path="$release_dir/loomle-skill-version.json"
          rm -rf "$release_dir"
          mkdir -p "$release_dir"

          "$GITHUB_WORKSPACE/scripts/package_loomle_skill.sh" \
            --name loomle-skill \
            --output "$zip_path"

          python3 - <<'PY' "$version_path"
          import json
          import os
          import pathlib
          from datetime import datetime, timezone

          out = pathlib.Path(os.sys.argv[1])
          payload = {
              "version": os.environ["GITHUB_REF_NAME"],
              "tag": os.environ["GITHUB_REF_NAME"],
              "commit": os.environ["GITHUB_SHA"],
              "published_at_utc": datetime.now(timezone.utc).isoformat(),
              "download_url": f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/download/{os.environ['GITHUB_REF_NAME']}/loomle-skill.zip",
          }
          out.write_text(json.dumps(payload, indent=2) + "\n")
          PY

          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"
          echo "version_path=$version_path" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release (Skill)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.version_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          make_latest: false

      - name: Update Stable Alias Release (skill-latest)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          zip_path="${{ steps.package.outputs.zip_path }}"

          if ! gh release view skill-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create skill-latest \
              --repo "$GITHUB_REPOSITORY" \
              --title "Skill Latest" \
              --notes "Stable alias release for latest loomle-skill package." \
              "$zip_path" \
              "${{ steps.package.outputs.version_path }}"
          else
            gh release upload skill-latest "$zip_path" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release upload skill-latest "${{ steps.package.outputs.version_path }}" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi
