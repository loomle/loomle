name: Promote Verified Loomle GitHub Release

on:
  workflow_dispatch:
    inputs:
      mac_run_id:
        description: Successful Verify Loomle Fab Plugin (Mac) workflow run ID
        required: true
        type: string
      windows_run_id:
        description: Successful Verify Loomle Fab Plugin (Windows) workflow run ID
        required: true
        type: string
      channel:
        description: Release channel
        required: true
        default: prerelease
        type: choice
        options:
          - prerelease
          - final

permissions:
  actions: read
  contents: write

concurrency:
  group: promote-loomle-github-release
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Verification Runs
        id: source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MAC_RUN_ID: ${{ inputs.mac_run_id }}
          WINDOWS_RUN_ID: ${{ inputs.windows_run_id }}
        run: |
          set -euo pipefail
          for run_id in "$MAC_RUN_ID" "$WINDOWS_RUN_ID"; do
            [[ "$run_id" =~ ^[0-9]+$ ]] || {
              echo "verification run IDs must be numeric GitHub Actions run IDs." >&2
              exit 1
            }
          done
          mac_run_json="$RUNNER_TEMP/mac-verification-run.json"
          windows_run_json="$RUNNER_TEMP/windows-verification-run.json"
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$MAC_RUN_ID" > "$mac_run_json"
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$WINDOWS_RUN_ID" > "$windows_run_json"
          head_sha="$(node -e '
            const fs = require("node:fs");
            const runs = [
              {
                label: "Mac",
                path: ".github/workflows/verify-fab-mac.yml",
                run: JSON.parse(fs.readFileSync(process.argv[1], "utf8")),
              },
              {
                label: "Windows",
                path: ".github/workflows/verify-fab-windows.yml",
                run: JSON.parse(fs.readFileSync(process.argv[2], "utf8")),
              },
            ];
            for (const { label, path, run } of runs) {
              const expected = {
                path,
                status: "completed",
                conclusion: "success",
                event: "workflow_dispatch",
                head_branch: "main",
              };
              for (const [field, value] of Object.entries(expected)) {
                if (run[field] !== value) {
                  throw new Error(`${label} verification run ${field} is ${JSON.stringify(run[field])}; expected ${JSON.stringify(value)}`);
                }
              }
              if (run.head_repository?.full_name !== process.env.GITHUB_REPOSITORY) {
                throw new Error(`${label} verification run belongs to another repository`);
              }
              if (!/^[0-9a-f]{40}$/.test(run.head_sha ?? "")) {
                throw new Error(`${label} verification run has no valid head SHA`);
              }
            }
            if (runs[0].run.head_sha !== runs[1].run.head_sha) {
              throw new Error("Mac and Windows verification runs do not test the same commit");
            }
            process.stdout.write(runs[0].run.head_sha);
          ' "$mac_run_json" "$windows_run_json")"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout Exact Verified Commit
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.source.outputs.head_sha }}

      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download Exact Verified Artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MAC_RUN_ID: ${{ inputs.mac_run_id }}
          WINDOWS_RUN_ID: ${{ inputs.windows_run_id }}
        run: |
          set -euo pipefail
          mkdir -p \
            "$RUNNER_TEMP/qa/mac" \
            "$RUNNER_TEMP/qa/windows" \
            "$RUNNER_TEMP/results/mac" \
            "$RUNNER_TEMP/results/windows"
          gh run download "$MAC_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name loomle-fab-plugin-darwin-arm64 \
            --dir "$RUNNER_TEMP/qa/mac"
          gh run download "$MAC_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name loomle-native-test-results-darwin-arm64 \
            --dir "$RUNNER_TEMP/results/mac"
          gh run download "$WINDOWS_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name loomle-fab-plugin-win32-x64 \
            --dir "$RUNNER_TEMP/qa/windows"
          gh run download "$WINDOWS_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name loomle-native-test-results-win32-x64 \
            --dir "$RUNNER_TEMP/results/windows"

      - name: Verify Promotion Contract
        id: release
        shell: bash
        env:
          CHANNEL: ${{ inputs.channel }}
          HEAD_SHA: ${{ steps.source.outputs.head_sha }}
        run: |
          set -euo pipefail
          mac_archive="$RUNNER_TEMP/qa/mac/loomle-fab-plugin-darwin-arm64.zip"
          mac_archive_sha_file="$mac_archive.sha256"
          mac_automation_result="$RUNNER_TEMP/results/mac/loomle-automation-results-darwin-arm64/result.json"
          mac_e2e_result="$RUNNER_TEMP/results/mac/loomle-packaged-e2e-results-darwin-arm64/result.json"
          windows_archive="$RUNNER_TEMP/qa/windows/loomle-fab-plugin-win32-x64.zip"
          windows_archive_sha_file="$windows_archive.sha256"
          windows_automation_result="$RUNNER_TEMP/results/windows/loomle-automation-results-win32-x64/result.json"
          windows_e2e_result="$RUNNER_TEMP/results/windows/loomle-packaged-e2e-results-win32-x64/result.json"

          validation="$RUNNER_TEMP/promotion-validation.json"
          node packaging/release/validate-promotion.mjs \
            --repo-root "$GITHUB_WORKSPACE" \
            --darwin-arm64-archive "$mac_archive" \
            --darwin-arm64-sha-file "$mac_archive_sha_file" \
            --darwin-arm64-automation-result "$mac_automation_result" \
            --darwin-arm64-e2e-result "$mac_e2e_result" \
            --win32-x64-archive "$windows_archive" \
            --win32-x64-sha-file "$windows_archive_sha_file" \
            --win32-x64-automation-result "$windows_automation_result" \
            --win32-x64-e2e-result "$windows_e2e_result" \
            --head-sha "$HEAD_SHA" \
            --channel "$CHANNEL" > "$validation"
          tag="$(node -p 'JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).tag' "$validation")"
          version="$(node -p 'JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).version' "$validation")"
          notes="$(node -p 'JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")).notesPath' "$validation")"
          echo "mac_archive=$mac_archive" >> "$GITHUB_OUTPUT"
          echo "mac_archive_sha_file=$mac_archive_sha_file" >> "$GITHUB_OUTPUT"
          echo "windows_archive=$windows_archive" >> "$GITHUB_OUTPUT"
          echo "windows_archive_sha_file=$windows_archive_sha_file" >> "$GITHUB_OUTPUT"
          echo "notes=$notes" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Require New Tag And Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG" >&2
            exit 1
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release already exists: $TAG" >&2
            exit 1
          fi

      - name: Publish Exact Verified Prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ steps.source.outputs.head_sha }}
          MAC_ARCHIVE: ${{ steps.release.outputs.mac_archive }}
          MAC_ARCHIVE_SHA_FILE: ${{ steps.release.outputs.mac_archive_sha_file }}
          NOTES: ${{ steps.release.outputs.notes }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          WINDOWS_ARCHIVE: ${{ steps.release.outputs.windows_archive }}
          WINDOWS_ARCHIVE_SHA_FILE: ${{ steps.release.outputs.windows_archive_sha_file }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            "$MAC_ARCHIVE" \
            "$MAC_ARCHIVE_SHA_FILE" \
            "$WINDOWS_ARCHIVE" \
            "$WINDOWS_ARCHIVE_SHA_FILE" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$HEAD_SHA" \
            --title "Loomle $VERSION" \
            --notes-file "$NOTES" \
            --prerelease
