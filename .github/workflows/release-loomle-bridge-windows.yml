name: Release LOOMLE (Windows)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: loomle-release-windows-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify-windows:
    uses: ./.github/workflows/release-verify-windows.yml
    secrets: inherit

  release-windows:
    needs: verify-windows
    runs-on: [self-hosted, Windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark Workspace As Git Safe Directory
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"

      - name: Ensure Tag Commit Is On Main
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          git fetch origin main --no-tags
          $tagCommit = (git rev-parse HEAD).Trim()
          git merge-base --is-ancestor $tagCommit origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Release tag commit $tagCommit is not reachable from origin/main"
          }

      - name: Resolve Unreal Engine Root (Windows)
        id: ue_root_windows
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        env:
          UE_FROM_VARS: ${{ vars.UE_5_7_ROOT_WINDOWS }}
        run: |
          $candidate = ""
          if ($env:UE_FROM_VARS) {
            $candidate = $env:UE_FROM_VARS
          } elseif ($env:UE_5_7_ROOT_WINDOWS) {
            $candidate = $env:UE_5_7_ROOT_WINDOWS
          } else {
            $candidate = "C:\Program Files\Epic Games\UE_5.7"
          }

          $runUat = Join-Path $candidate "Engine\Build\BatchFiles\RunUAT.bat"
          if (-not (Test-Path -LiteralPath $runUat)) {
            throw "RunUAT.bat not found. Set UE_5_7_ROOT_WINDOWS (repo var or runner env). Tried: $runUat"
          }

          "ue_root=$candidate" >> $env:GITHUB_OUTPUT
          "run_uat=$runUat" >> $env:GITHUB_OUTPUT

      - name: Ensure Rust Toolchain
        timeout-minutes: 20
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          Write-Host "Checking cargo availability..."

          function Test-Cargo([string]$CargoPath) {
            & $CargoPath --version
            return ($LASTEXITCODE -eq 0)
          }

          function Ensure-DefaultRustToolchain([string]$CargoPath) {
            $cargoBin = Split-Path -Parent $CargoPath
            $rustupExe = Join-Path $cargoBin "rustup.exe"
            if (-not (Test-Path -LiteralPath $rustupExe)) {
              return $false
            }

            & $rustupExe toolchain install stable --profile minimal
            if ($LASTEXITCODE -ne 0) {
              throw "rustup toolchain install stable --profile minimal failed with exit code $LASTEXITCODE"
            }

            & $rustupExe default stable
            if ($LASTEXITCODE -ne 0) {
              throw "rustup default stable failed with exit code $LASTEXITCODE"
            }

            return $true
          }

          $candidateBins = @()
          if ($env:CARGO_HOME) {
            $candidateBins += (Join-Path $env:CARGO_HOME "bin")
          }
          if ($env:USERPROFILE) {
            $candidateBins += (Join-Path $env:USERPROFILE ".cargo\bin")
          }
          if ($env:HOMEDRIVE -and $env:HOMEPATH) {
            $candidateBins += (Join-Path "$env:HOMEDRIVE$env:HOMEPATH" ".cargo\bin")
          }
          $candidateBins = $candidateBins | Select-Object -Unique

          foreach ($bin in $candidateBins) {
            $cargoExe = Join-Path $bin "cargo.exe"
            if (Test-Path -LiteralPath $cargoExe) {
              $bin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              if (Test-Cargo $cargoExe) {
                exit 0
              }
              if ((Ensure-DefaultRustToolchain $cargoExe) -and (Test-Cargo $cargoExe)) {
                exit 0
              }
            }
          }

          $cargoCmd = Get-Command cargo -ErrorAction SilentlyContinue
          if ($cargoCmd) {
            if (Test-Cargo $cargoCmd.Source) {
              exit 0
            }
            if ((Ensure-DefaultRustToolchain $cargoCmd.Source) -and (Test-Cargo $cargoCmd.Source)) {
              exit 0
            }
          }

          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          $rustupInit = Join-Path $env:RUNNER_TEMP "rustup-init.exe"
          Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile $rustupInit
          $rustup = Start-Process -FilePath $rustupInit -ArgumentList "-y --profile minimal --default-toolchain stable" -Wait -PassThru -NoNewWindow
          if ($rustup.ExitCode -ne 0) {
            throw "rustup-init failed with exit code $($rustup.ExitCode)"
          }

          $cargoHome = if ($env:CARGO_HOME) { $env:CARGO_HOME } else { Join-Path $env:USERPROFILE ".cargo" }
          $cargoBin = Join-Path $cargoHome "bin"
          $cargoExe = Join-Path $cargoBin "cargo.exe"
          if (-not (Test-Path -LiteralPath $cargoExe)) {
            throw "cargo.exe not found after Rust setup: $cargoExe"
          }

          $cargoBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $cargoExe --version

      - name: Build Rust Binaries
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          Push-Location (Join-Path $env:GITHUB_WORKSPACE "mcp\server")
          cargo build --release
          Pop-Location

          Push-Location (Join-Path $env:GITHUB_WORKSPACE "mcp\client")
          cargo build --release
          Pop-Location

      - name: Package LOOMLE Release (Windows)
        id: package
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          function Get-Sha256([string]$Path) {
            $output = & certutil -hashfile $Path SHA256
            if ($LASTEXITCODE -ne 0) {
              throw "certutil failed for $Path with exit code $LASTEXITCODE"
            }

            foreach ($line in $output) {
              if ($line -match '^[0-9A-Fa-f ]+$') {
                return ($line -replace ' ', '').ToLower()
              }
            }

            throw "Failed to parse SHA256 from certutil output for $Path"
          }

          $plugin = Join-Path $env:GITHUB_WORKSPACE "engine\LoomleBridge\LoomleBridge.uplugin"
          if (-not (Test-Path -LiteralPath $plugin)) {
            throw "Plugin descriptor not found: $plugin"
          }

          $version = "${{ github.ref_name }}".Substring(1)
          $packageDir = Join-Path $env:RUNNER_TEMP "LoomleBridge_Windows"
          $bundleDir = Join-Path $env:RUNNER_TEMP "loomle-release-bundle-windows"
          $releaseDir = Join-Path $env:RUNNER_TEMP "loomle-release-assets-windows"
          $archivePath = Join-Path $releaseDir "loomle-windows.zip"
          $manifestPath = Join-Path $releaseDir "loomle-manifest-windows.json"
          $bootstrapCliPath = Join-Path $releaseDir "loomle.exe"

          Remove-Item -LiteralPath $packageDir, $bundleDir, $releaseDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path `
            (Join-Path $bundleDir "plugin\LoomleBridge"), `
            (Join-Path $bundleDir "workspace"), `
            $releaseDir | Out-Null

          & "${{ steps.ue_root_windows.outputs.run_uat }}" BuildPlugin "-Plugin=$plugin" "-Package=$packageDir" "-TargetPlatforms=Win64" -Rocket
          if ($LASTEXITCODE -ne 0) {
            throw "BuildPlugin failed with exit code $LASTEXITCODE"
          }

          Copy-Item -Path (Join-Path $packageDir "*") -Destination (Join-Path $bundleDir "plugin\LoomleBridge") -Recurse -Force

          $serverSrc = Join-Path $env:GITHUB_WORKSPACE "mcp\server\target\release\loomle_mcp_server.exe"
          $clientSrc = Join-Path $env:GITHUB_WORKSPACE "mcp\client\target\release\loomle.exe"
          if (-not (Test-Path -LiteralPath $serverSrc)) {
            throw "Server binary missing: $serverSrc"
          }
          if (-not (Test-Path -LiteralPath $clientSrc)) {
            throw "Client binary missing: $clientSrc"
          }

          $serverRelPath = "plugin/LoomleBridge/Tools/mcp/windows/loomle_mcp_server.exe"
          $clientRelPath = "workspace/Loomle/client/loomle.exe"
          $serverDst = Join-Path $bundleDir ($serverRelPath -replace '/', '\')
          $clientDst = Join-Path $bundleDir ($clientRelPath -replace '/', '\')

          New-Item -ItemType Directory -Force -Path `
            (Split-Path -Parent $serverDst), `
            (Split-Path -Parent $clientDst), `
            (Join-Path $bundleDir "mcp\client\windows") | Out-Null

          Copy-Item -LiteralPath $serverSrc -Destination $serverDst -Force
          Copy-Item -Path (Join-Path $env:GITHUB_WORKSPACE "workspace\Loomle\*") -Destination (Join-Path $bundleDir "workspace\Loomle") -Recurse -Force
          Copy-Item -LiteralPath $clientSrc -Destination $clientDst -Force
          Copy-Item -LiteralPath $clientSrc -Destination (Join-Path $bundleDir "mcp\client\windows\loomle.exe") -Force
          Copy-Item -LiteralPath $clientSrc -Destination $bootstrapCliPath -Force

          Compress-Archive -Path (Join-Path $bundleDir "*") -DestinationPath $archivePath -Force

          $packageSha = Get-Sha256 $archivePath
          $serverSha = Get-Sha256 $serverDst
          $clientSha = Get-Sha256 $clientDst
          $assetUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/loomle-windows.zip"

          python (Join-Path $env:GITHUB_WORKSPACE "packaging\bundle\build_release_manifest.py") `
            --manifest-path $manifestPath `
            --version $version `
            --platform windows `
            --asset-url $assetUrl `
            --sha256 $packageSha `
            --server-binary-relpath $serverRelPath `
            --server-sha256 $serverSha `
            --client-binary-relpath $clientRelPath `
            --client-sha256 $clientSha

          "archive_path=$archivePath" >> $env:GITHUB_OUTPUT
          "manifest_path=$manifestPath" >> $env:GITHUB_OUTPUT
          "bootstrap_cli_path=$bootstrapCliPath" >> $env:GITHUB_OUTPUT

      - name: Publish Tag Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive_path }}
            ${{ steps.package.outputs.manifest_path }}
            ${{ steps.package.outputs.bootstrap_cli_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
