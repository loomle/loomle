name: Release LOOMLE (Windows)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: loomle-release-windows-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify-windows:
    uses: ./.github/workflows/release-verify-windows.yml
    secrets: inherit

  release-windows:
    needs: verify-windows
    runs-on: [self-hosted, Windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Verify Release Inputs
        uses: actions/download-artifact@v4
        with:
          name: release-verify-windows-inputs
          path: ${{ runner.temp }}/loomle-release-inputs-windows

      - name: Mark Workspace As Git Safe Directory
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"

      - name: Ensure Tag Commit Is On Main
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          git fetch origin main --no-tags
          $tagCommit = (git rev-parse HEAD).Trim()
          git merge-base --is-ancestor $tagCommit origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Release tag commit $tagCommit is not reachable from origin/main"
          }

      - name: Package LOOMLE Release (Windows)
        id: package
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          function Get-Sha256([string]$Path) {
            $output = & certutil -hashfile $Path SHA256
            if ($LASTEXITCODE -ne 0) {
              throw "certutil failed for $Path with exit code $LASTEXITCODE"
            }

            foreach ($line in $output) {
              if ($line -match '^[0-9A-Fa-f ]+$') {
                return ($line -replace ' ', '').ToLower()
              }
            }

            throw "Failed to parse SHA256 from certutil output for $Path"
          }

          $version = "${{ github.ref_name }}".Substring(1)
          $inputsDir = Join-Path $env:RUNNER_TEMP "loomle-release-inputs-windows"
          $bundleDir = Join-Path $env:RUNNER_TEMP "loomle-release-bundle-windows"
          $releaseDir = Join-Path $env:RUNNER_TEMP "loomle-release-assets-windows"
          $archivePath = Join-Path $releaseDir "loomle-windows.zip"
          $manifestPath = Join-Path $releaseDir "loomle-manifest-windows.json"

          $nestedInputsDir = Join-Path $inputsDir "release-verify-windows-inputs"
          if (Test-Path -LiteralPath $nestedInputsDir) {
            $inputsDir = $nestedInputsDir
          }

          Remove-Item -LiteralPath $bundleDir, $releaseDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path `
            (Join-Path $bundleDir "plugin\LoomleBridge"), `
            (Join-Path $bundleDir "workspace"), `
            $releaseDir | Out-Null

          if (-not (Test-Path -LiteralPath (Join-Path $inputsDir "plugin\LoomleBridge"))) {
            throw "Verify plugin inputs missing: $(Join-Path $inputsDir 'plugin\LoomleBridge')"
          }
          if (-not (Test-Path -LiteralPath (Join-Path $inputsDir "workspace\Loomle"))) {
            throw "Verify workspace inputs missing: $(Join-Path $inputsDir 'workspace\Loomle')"
          }
          if (-not (Test-Path -LiteralPath (Join-Path $inputsDir "client\windows\loomle.exe"))) {
            throw "Verify client inputs missing: $(Join-Path $inputsDir 'client\windows\loomle.exe')"
          }

          $clientRelPath = "Loomle/loomle.exe"
          $clientDst = Join-Path $bundleDir ($clientRelPath -replace '/', '\')

          New-Item -ItemType Directory -Force -Path `
            (Split-Path -Parent $clientDst), `
            (Join-Path $bundleDir "client\windows") | Out-Null

          Copy-Item -Path (Join-Path $inputsDir "plugin\LoomleBridge\*") -Destination (Join-Path $bundleDir "plugin\LoomleBridge") -Recurse -Force
          Copy-Item -Path (Join-Path $inputsDir "workspace\Loomle\*") -Destination (Join-Path $bundleDir "Loomle") -Recurse -Force
          Copy-Item -LiteralPath (Join-Path $inputsDir ($clientRelPath -replace '/', '\')) -Destination $clientDst -Force
          Copy-Item -LiteralPath (Join-Path $inputsDir "client\windows\loomle.exe") -Destination (Join-Path $bundleDir "client\windows\loomle.exe") -Force

          python (Join-Path $env:GITHUB_WORKSPACE "packaging\release\write_bundle_zip.py") `
            --bundle-dir $bundleDir `
            --archive-path $archivePath

          $packageSha = Get-Sha256 $archivePath
          $clientSha = Get-Sha256 $clientDst
          $assetUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/loomle-windows.zip"

          python (Join-Path $env:GITHUB_WORKSPACE "packaging\bundle\build_release_manifest.py") `
            --manifest-path $manifestPath `
            --version $version `
            --platform windows `
            --asset-url $assetUrl `
            --sha256 $packageSha `
            --client-binary-relpath $clientRelPath `
            --client-sha256 $clientSha

          "archive_path=$archivePath" >> $env:GITHUB_OUTPUT
          "manifest_path=$manifestPath" >> $env:GITHUB_OUTPUT

      - name: Publish Tag Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive_path }}
            ${{ steps.package.outputs.manifest_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
