name: Verify LOOMLE (Mac)

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  verify-mac:
    runs-on: [self-hosted, macOS]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Release Version Strings
        shell: bash
        run: |
          set -euo pipefail
          cmd=(python3 "$GITHUB_WORKSPACE/packaging/tools/check_release_versions.py" --repo-root "$GITHUB_WORKSPACE")
          if [[ "${GITHUB_REF_NAME:-}" == v* ]]; then
            cmd+=(--expected-version "${GITHUB_REF_NAME#v}")
          fi
          "${cmd[@]}"

      - name: Resolve Unreal Engine Root (Mac)
        id: ue_root_mac
        shell: bash
        env:
          UE_FROM_VARS: ${{ vars.UE_5_7_ROOT_MAC }}
        run: |
          set -euo pipefail
          candidate=""
          if [[ -n "${UE_FROM_VARS:-}" ]]; then
            candidate="$UE_FROM_VARS"
          elif [[ -n "${UE_5_7_ROOT_MAC:-}" ]]; then
            candidate="$UE_5_7_ROOT_MAC"
          else
            candidate="/Users/Shared/Epic Games/UE_5.7"
          fi

          run_uat="$candidate/Engine/Build/BatchFiles/RunUAT.sh"
          if [[ ! -x "$run_uat" ]]; then
            echo "RunUAT.sh not found. Set UE_5_7_ROOT_MAC (repo var or runner env). Tried: $run_uat" >&2
            exit 1
          fi

          ue_app="$candidate/Engine/Binaries/Mac/UnrealEditor.app"
          if [[ ! -d "$ue_app" ]]; then
            echo "UnrealEditor.app not found: $ue_app" >&2
            exit 1
          fi

          {
            echo "ue_root=$candidate"
            echo "run_uat=$run_uat"
            echo "ue_app=$ue_app"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Test Project Root
        id: test_project
        shell: bash
        env:
          TEST_ROOT_FROM_VARS: ${{ vars.LOOMLE_TEST_PROJECT_ROOT_MAC }}
        run: |
          set -euo pipefail
          test_root=""
          if [[ -n "${TEST_ROOT_FROM_VARS:-}" ]]; then
            test_root="$TEST_ROOT_FROM_VARS"
          elif [[ -n "${LOOMLE_TEST_PROJECT_ROOT_MAC:-}" ]]; then
            test_root="$LOOMLE_TEST_PROJECT_ROOT_MAC"
          else
            runner_work_root="$(cd "$GITHUB_WORKSPACE/../.." && pwd)"
            test_root="$runner_work_root/lrh/LoomleRunnerHost"
          fi

          "$GITHUB_WORKSPACE/tests/tools/runner_init_host_project.sh" "$test_root"

          [[ -d "$test_root" ]] || { echo "Test project root not found: $test_root" >&2; exit 1; }
          uproject="$(find "$test_root" -maxdepth 1 -type f -name '*.uproject' | head -n 1)"
          [[ -n "$uproject" ]] || { echo "No .uproject found under $test_root" >&2; exit 1; }

          socket="$test_root/Intermediate/loomle.sock"
          {
            echo "test_root=$test_root"
            echo "uproject=$uproject"
            echo "socket=$socket"
          } >> "$GITHUB_OUTPUT"

      - name: Run Rust Unit Tests
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/client"
          cargo test

      - name: Stop Stale AutomationTool Before Plugin Sync
        shell: bash
        run: |
          set -euo pipefail
          pkill -f "AutomationTool\\.dll" || true
          pkill -f "RunUAT\\.sh" || true
          sleep 2

      - name: Build Plugin From Current Commit And Sync To Test Project
        shell: bash
        run: |
          set -euo pipefail
          plugin="$GITHUB_WORKSPACE/engine/LoomleBridge/LoomleBridge.uplugin"
          [[ -f "$plugin" ]] || { echo "Plugin descriptor not found: $plugin" >&2; exit 1; }

          package_dir="$RUNNER_TEMP/LoomleBridge_Gating"
          plugin_dst="${{ steps.test_project.outputs.test_root }}/Plugins/LoomleBridge"
          rm -rf "$package_dir"

          "${{ steps.ue_root_mac.outputs.run_uat }}" BuildPlugin \
            -Plugin="$plugin" \
            -Package="$package_dir" \
            -TargetPlatforms=Mac \
            -Rocket

          mkdir -p "$plugin_dst"
          rsync -a --delete "$package_dir"/ "$plugin_dst"/

      - name: Build LOOMLE Client Binary (Release) And Sync To Test Project Workspace
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/client"
          cargo build --release

          client_src="$GITHUB_WORKSPACE/client/target/release/loomle"
          client_root="$GITHUB_WORKSPACE/client"
          workspace_src="$GITHUB_WORKSPACE/workspace/Loomle"
          [[ -x "$client_src" ]] || { echo "LOOMLE client binary missing or not executable: $client_src" >&2; exit 1; }
          [[ -d "$client_root" ]] || { echo "LOOMLE client root missing: $client_root" >&2; exit 1; }
          [[ -d "$workspace_src" ]] || { echo "LOOMLE workspace missing: $workspace_src" >&2; exit 1; }

          loomle_dst="${{ steps.test_project.outputs.test_root }}/Loomle"
          rm -rf "$loomle_dst"
          rsync -a "$workspace_src"/ "$loomle_dst"/
          cp "$client_src" "$loomle_dst/loomle"
          cp "$client_root/update.sh" "$loomle_dst/update.sh"
          chmod +x "$loomle_dst/loomle"
          chmod +x "$loomle_dst/update.sh"

      - name: Stage Release Inputs
        shell: bash
        run: |
          set -euo pipefail
          release_inputs="$RUNNER_TEMP/loomle-release-inputs-darwin"
          plugin_src="$RUNNER_TEMP/LoomleBridge_Gating"
          client_root="$GITHUB_WORKSPACE/client"
          workspace_src="$GITHUB_WORKSPACE/workspace/Loomle"
          client_src="$GITHUB_WORKSPACE/client/target/release/loomle"

          [[ -d "$plugin_src" ]] || { echo "Packaged plugin missing: $plugin_src" >&2; exit 1; }
          [[ -d "$client_root" ]] || { echo "Client root missing: $client_root" >&2; exit 1; }
          [[ -d "$workspace_src" ]] || { echo "Workspace missing: $workspace_src" >&2; exit 1; }
          [[ -x "$client_src" ]] || { echo "Client binary missing: $client_src" >&2; exit 1; }

          rm -rf "$release_inputs"
          mkdir -p "$release_inputs/loomle/Loomle"

          rsync -a "$plugin_src"/ "$release_inputs/plugin/LoomleBridge"/
          rsync -a "$workspace_src"/ "$release_inputs/loomle/Loomle"/
          cp "$client_src" "$release_inputs/loomle/Loomle/loomle"
          cp "$client_root/update.sh" "$release_inputs/loomle/Loomle/update.sh"
          chmod +x \
            "$release_inputs/loomle/Loomle/loomle" \
            "$release_inputs/loomle/Loomle/update.sh"

      - name: Upload Release Inputs
        uses: actions/upload-artifact@v4
        with:
          name: release-verify-mac-inputs
          path: ${{ runner.temp }}/loomle-release-inputs-darwin
          if-no-files-found: error

      - name: Restart Unreal Editor For Verification
        shell: bash
        run: |
          set -euo pipefail
          pkill -f "UnrealEditor.*${{ steps.test_project.outputs.uproject }}" || true
          sleep 2
          open -na "${{ steps.ue_root_mac.outputs.ue_app }}" --args "${{ steps.test_project.outputs.uproject }}"

      - name: Wait For Bridge Socket
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' "${{ steps.test_project.outputs.socket }}"
          import os
          import socket
          import sys
          import time

          sock = sys.argv[1]
          deadline = time.time() + 240
          while time.time() < deadline:
              if os.path.exists(sock):
                  try:
                      s = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
                      s.settimeout(0.5)
                      s.connect(sock)
                      s.close()
                      print("READY")
                      raise SystemExit(0)
                  except Exception:
                      pass
              time.sleep(1)
          print(f"TIMEOUT waiting for socket: {sock}")
          raise SystemExit(1)
          PY

      - name: Run Smoke Integration Test
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          python3 tests/e2e/test_bridge_smoke.py \
            --project-root "${{ steps.test_project.outputs.test_root }}"

      - name: Run Regression Integration Test
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          python3 tests/e2e/test_bridge_regression.py \
            --project-root "${{ steps.test_project.outputs.test_root }}"

      - name: Tail Unreal Project Log On Failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          log_dir="${{ steps.test_project.outputs.test_root }}/Saved/Logs"
          if [[ ! -d "$log_dir" ]]; then
            echo "Unreal log directory not found: $log_dir"
            exit 0
          fi

          latest_log="$(ls -t "$log_dir"/*.log 2>/dev/null | head -n 1 || true)"
          if [[ -z "$latest_log" ]]; then
            echo "No Unreal log files found under $log_dir"
            exit 0
          fi

          echo "===== Tail of $latest_log ====="
          tail -n 200 "$latest_log"

      - name: Upload Unreal Project Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-verify-mac-logs
          path: ${{ steps.test_project.outputs.test_root }}/Saved/Logs/*.log
          if-no-files-found: ignore

      - name: Run Non-Blocking Latency Benchmark
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          python3 tests/integration/test_loomle_latency.py \
            --project-root "${{ steps.test_project.outputs.test_root }}"

      - name: Upload Benchmark Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-verify-benchmarks
          path: runtime/benchmarks/*.csv
          if-no-files-found: ignore

      - name: Stop Unreal Editor
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          pkill -f "UnrealEditor.*${{ steps.test_project.outputs.uproject }}" || true
