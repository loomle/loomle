name: Release LOOMLE (Fab)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: loomle-release-fab-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-fab:
    runs-on: [self-hosted, macOS]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Ensure Tag Commit Is On Main
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if git fetch origin main --depth=100 --no-tags; then
              break
            fi
            if [[ "$attempt" == "3" ]]; then
              echo "Failed to fetch origin/main after $attempt attempts" >&2
              exit 1
            fi
            sleep $((attempt * 5))
          done
          tag_commit="$(git rev-parse HEAD)"
          git merge-base --is-ancestor "$tag_commit" origin/main || {
            echo "Release tag commit $tag_commit is not reachable from origin/main" >&2
            exit 1
          }

      - name: Check Release Version Strings
        shell: bash
        run: |
          set -euo pipefail
          expected=""
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" == v* ]]; then
            expected="${GITHUB_REF_NAME#v}"
          fi

          args=(--repo-root "$GITHUB_WORKSPACE")
          if [[ -n "$expected" ]]; then
            args+=(--expected-version "$expected")
          fi

          python3 "$GITHUB_WORKSPACE/packaging/tools/check_release_versions.py" "${args[@]}"

      - name: Resolve Unreal Engine Root (Mac)
        id: ue_root_mac
        shell: bash
        env:
          UE_FROM_VARS: ${{ vars.UE_5_7_ROOT_MAC }}
        run: |
          set -euo pipefail
          candidate=""
          if [[ -n "${UE_FROM_VARS:-}" ]]; then
            candidate="$UE_FROM_VARS"
          elif [[ -n "${UE_5_7_ROOT_MAC:-}" ]]; then
            candidate="$UE_5_7_ROOT_MAC"
          else
            candidate="/Users/Shared/Epic Games/UE_5.7"
          fi

          run_uat="$candidate/Engine/Build/BatchFiles/RunUAT.sh"
          [[ -x "$run_uat" ]] || { echo "RunUAT.sh not found: $run_uat" >&2; exit 1; }
          echo "run_uat=$run_uat" >> "$GITHUB_OUTPUT"

      - name: Package LOOMLE Fab Plugin
        id: package
        timeout-minutes: 25
        shell: bash
        run: |
          set -euo pipefail

          staging_dir="$RUNNER_TEMP/loomle-fab-staging"
          package_root="$RUNNER_TEMP/loomle-fab-package-root"
          package_dir="$package_root/LoomleBridge"
          release_dir="$RUNNER_TEMP/loomle-release-assets-fab"
          archive_path="$release_dir/loomle-fab-plugin.zip"

          rm -rf "$staging_dir" "$package_root" "$release_dir"
          mkdir -p "$release_dir"

          python3 "$GITHUB_WORKSPACE/packaging/fab/assemble_fab_plugin.py" \
            --repo-root "$GITHUB_WORKSPACE" \
            --output-dir "$staging_dir"

          "${{ steps.ue_root_mac.outputs.run_uat }}" BuildPlugin \
            -Plugin="$staging_dir/LoomleBridge/LoomleBridge.uplugin" \
            -Package="$package_dir" \
            -TargetPlatforms=Mac \
            -Rocket

          python3 -c 'import shutil, sys; from pathlib import Path; package_root = Path(sys.argv[1]); archive_path = Path(sys.argv[2]); shutil.make_archive(str(archive_path.with_suffix("")), "zip", package_root, "LoomleBridge")' \
            "$package_root" \
            "$archive_path"

          echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"

      - name: Publish Tag Release Asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            create_output=$(gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --latest=false \
              --generate-notes 2>&1) || {
              if ! echo "$create_output" | grep -q "already exists"; then
                echo "$create_output" >&2
                exit 1
              fi
            }
          fi

          gh release upload "$tag" \
            "${{ steps.package.outputs.archive_path }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
