name: Release LOOMLE (Fab)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package for Fab, for example v0.6.2"
        required: true
        type: string
  workflow_run:
    workflows:
      - Finalize LOOMLE Release
    types:
      - completed

concurrency:
  group: loomle-release-fab-${{ github.event.inputs.tag || github.event.workflow_run.head_sha || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-fab:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, macOS]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Release Tag
        id: release_tag
        shell: bash
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          git fetch origin main --depth=100 --no-tags
          git fetch origin 'refs/tags/v*:refs/tags/v*' --force

          if [[ -n "${DISPATCH_TAG:-}" ]]; then
            tag="$DISPATCH_TAG"
            [[ "$tag" == v* ]] || { echo "Fab release tag must start with v: $tag" >&2; exit 1; }
            tag_commit="$(git rev-parse "$tag^{commit}")"
          else
            head_sha="${WORKFLOW_RUN_SHA:-}"
            [[ -n "$head_sha" ]] || { echo "workflow_run head_sha is missing" >&2; exit 1; }
            mapfile -t matching_tags < <(git tag --points-at "$head_sha" | grep '^v' || true)
            if [[ "${#matching_tags[@]}" -ne 1 ]]; then
              echo "Expected exactly one v* tag for finalized commit $head_sha, found ${#matching_tags[@]}: ${matching_tags[*]:-}" >&2
              exit 1
            fi
            tag="${matching_tags[0]}"
            tag_commit="$head_sha"
          fi

          git checkout --detach "$tag_commit"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "tag_commit=$tag_commit" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Ensure Tag Commit Is On Main
        shell: bash
        run: |
          set -euo pipefail
          tag_commit="${{ steps.release_tag.outputs.tag_commit }}"
          git merge-base --is-ancestor "$tag_commit" origin/main || {
            echo "Release tag commit $tag_commit is not reachable from origin/main" >&2
            exit 1
          }

      - name: Check Release Version Strings
        shell: bash
        run: |
          set -euo pipefail
          python3 "$GITHUB_WORKSPACE/packaging/tools/check_release_versions.py" \
            --repo-root "$GITHUB_WORKSPACE" \
            --expected-version "${{ steps.release_tag.outputs.version }}"

      - name: Resolve Unreal Engine Root (Mac)
        id: ue_root_mac
        shell: bash
        env:
          UE_FROM_VARS: ${{ vars.UE_5_7_ROOT_MAC }}
        run: |
          set -euo pipefail
          candidate=""
          if [[ -n "${UE_FROM_VARS:-}" ]]; then
            candidate="$UE_FROM_VARS"
          elif [[ -n "${UE_5_7_ROOT_MAC:-}" ]]; then
            candidate="$UE_5_7_ROOT_MAC"
          else
            candidate="/Users/Shared/Epic Games/UE_5.7"
          fi

          run_uat="$candidate/Engine/Build/BatchFiles/RunUAT.sh"
          [[ -x "$run_uat" ]] || { echo "RunUAT.sh not found: $run_uat" >&2; exit 1; }
          echo "run_uat=$run_uat" >> "$GITHUB_OUTPUT"

      - name: Package LOOMLE Fab Plugin
        id: package
        timeout-minutes: 25
        shell: bash
        run: |
          set -euo pipefail

          staging_dir="$RUNNER_TEMP/loomle-fab-staging"
          package_root="$RUNNER_TEMP/loomle-fab-package-root"
          package_dir="$package_root/LoomleBridge"
          release_dir="$RUNNER_TEMP/loomle-release-assets-fab"
          archive_path="$release_dir/loomle-fab-plugin.zip"

          rm -rf "$staging_dir" "$package_root" "$release_dir"
          mkdir -p "$release_dir"

          python3 "$GITHUB_WORKSPACE/packaging/fab/assemble_fab_plugin.py" \
            --repo-root "$GITHUB_WORKSPACE" \
            --output-dir "$staging_dir"

          "${{ steps.ue_root_mac.outputs.run_uat }}" BuildPlugin \
            -Plugin="$staging_dir/LoomleBridge/LoomleBridge.uplugin" \
            -Package="$package_dir" \
            -TargetPlatforms=Mac \
            -Rocket

          python3 -c 'import shutil, sys; from pathlib import Path; package_root = Path(sys.argv[1]); archive_path = Path(sys.argv[2]); shutil.make_archive(str(archive_path.with_suffix("")), "zip", package_root, "LoomleBridge")' \
            "$package_root" \
            "$archive_path"

          echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"

      - name: Publish Tag Release Asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release_tag.outputs.tag }}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            create_output=$(gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --latest=false \
              --generate-notes 2>&1) || {
              if ! echo "$create_output" | grep -q "already exists"; then
                echo "$create_output" >&2
                exit 1
              fi
            }
          fi

          gh release upload "$tag" \
            "${{ steps.package.outputs.archive_path }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
