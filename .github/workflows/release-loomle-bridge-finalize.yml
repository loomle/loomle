name: Finalize LOOMLE Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to finalize (for example v0.3.0)"
        required: true
        type: string
  push:
    tags:
      - "v*"

concurrency:
  group: loomle-release-finalize-${{ github.ref_name || github.event.inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  finalize-release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Target Tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          [[ "$tag" == v* ]] || { echo "Tag must start with v: $tag" >&2; exit 1; }
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 1

      - name: Resolve Tag Commit
        id: tag_commit
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          ref_json="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$tag")"
          object_type="$(jq -r '.object.type' <<<"$ref_json")"
          object_sha="$(jq -r '.object.sha' <<<"$ref_json")"

          case "$object_type" in
            commit)
              tag_commit="$object_sha"
              ;;
            tag)
              tag_json="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$object_sha")"
              tag_commit="$(jq -r '.object.sha' <<<"$tag_json")"
              ;;
            *)
              echo "Unsupported tag object type for $tag: $object_type" >&2
              exit 1
              ;;
          esac

          echo "tag_commit=$tag_commit" >> "$GITHUB_OUTPUT"

      - name: Wait For Platform Assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_COMMIT: ${{ steps.tag_commit.outputs.tag_commit }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          tag_commit="$TAG_COMMIT"
          required=(
            "loomle-darwin.zip"
            "loomle-windows.zip"
            "loomle-manifest-darwin.json"
            "loomle-manifest-windows.json"
          )

          resolve_workflow_state() {
            local workflow_name="$1"
            local output=""
            local attempt
            for attempt in 1 2 3; do
              if output="$(gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow "$workflow_name" \
                --limit 100 \
                --json databaseId,headSha,status,conclusion,createdAt,url,event \
                --jq '
                map(select(.headSha == "'"$tag_commit"'"))
                | sort_by(.createdAt)
                | reverse
                | if length == 0 then
                    {
                      status: "missing",
                      conclusion: "",
                      url: "",
                      event: ""
                    }
                  else
                    (map(select(.status != "completed")) | .[0]) as $active
                    | if $active != null then
                        {
                          status: $active.status,
                          conclusion: ($active.conclusion // ""),
                          url: ($active.url // ""),
                          event: ($active.event // "")
                        }
                      else
                        (map(select(.conclusion == "success")) | .[0]) as $success
                        | if $success != null then
                            {
                              status: "completed",
                              conclusion: "success",
                              url: ($success.url // ""),
                              event: ($success.event // "")
                            }
                          else
                            .[0] // {}
                            | {
                                status: (.status // "missing"),
                                conclusion: (.conclusion // ""),
                                url: (.url // ""),
                                event: (.event // "")
                              }
                          end
                      end
                  end
              ')"; then
                printf '%s\n' "$output"
                return 0
              fi
              echo "gh run list failed for $workflow_name on attempt $attempt; retrying..." >&2
              sleep 10
            done

            printf '{"status":"api_error","conclusion":"","url":"","event":""}\n'
            return 0
          }

          for _ in $(seq 1 90); do
            mac_state="$(resolve_workflow_state 'Release LOOMLE (Mac)')"
            win_state="$(resolve_workflow_state 'Release LOOMLE (Windows)')"

            mac_status="$(jq -r '.status' <<<"$mac_state")"
            mac_conclusion="$(jq -r '.conclusion' <<<"$mac_state")"
            mac_url="$(jq -r '.url' <<<"$mac_state")"
            mac_event="$(jq -r '.event' <<<"$mac_state")"
            win_status="$(jq -r '.status' <<<"$win_state")"
            win_conclusion="$(jq -r '.conclusion' <<<"$win_state")"
            win_url="$(jq -r '.url' <<<"$win_state")"
            win_event="$(jq -r '.event' <<<"$win_state")"

            if [[ "$mac_status" == "completed" && "$mac_conclusion" != "success" ]]; then
              echo "Mac release workflow failed for tag $tag: $mac_conclusion (event=${mac_event:-unknown})" >&2
              [[ -n "$mac_url" ]] && echo "Mac run: $mac_url" >&2
              exit 1
            fi
            if [[ "$win_status" == "completed" && "$win_conclusion" != "success" ]]; then
              echo "Windows release workflow failed for tag $tag: $win_conclusion (event=${win_event:-unknown})" >&2
              [[ -n "$win_url" ]] && echo "Windows run: $win_url" >&2
              exit 1
            fi

            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              mapfile -t names < <(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')
              missing=0
              for req in "${required[@]}"; do
                found=0
                for n in "${names[@]}"; do
                  if [[ "$n" == "$req" ]]; then
                    found=1
                    break
                  fi
                done
                if [[ $found -eq 0 ]]; then
                  missing=1
                  break
                fi
              done
              if [[ $missing -eq 0 ]]; then
                exit 0
              fi
            fi
            sleep 20
          done

          echo "Timed out waiting for platform assets on $tag" >&2
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets || true
          exit 1

      - name: Download Platform Assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          mkdir -p release-finalize
          gh release download "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "loomle-darwin.zip" \
            --pattern "loomle-windows.zip" \
            --pattern "loomle-manifest-darwin.json" \
            --pattern "loomle-manifest-windows.json" \
            --dir release-finalize

      - name: Merge Manifests
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          version = "${{ steps.tag.outputs.version }}"
          out = {
              "latest": version,
              "installer": {},
              "versions": {version: {"packages": {}}},
          }

          for name in ("loomle-manifest-darwin.json", "loomle-manifest-windows.json"):
              data = json.loads(Path("release-finalize", name).read_text(encoding="utf-8"))
              out["installer"].update(data.get("installer", {}))
              packages = data["versions"][version]["packages"]
              out["versions"][version]["packages"].update(packages)

          Path("release-finalize/loomle-manifest.json").write_text(
              json.dumps(out, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload Final Manifest To Tag Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          gh release upload "$tag" release-finalize/loomle-manifest.json \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Update Stable Alias Release (loomle-latest)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view loomle-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create loomle-latest \
              --repo "$GITHUB_REPOSITORY" \
              --title "LOOMLE Latest" \
              --latest=false \
              --notes "Stable alias release for the latest LOOMLE release archives and manifest." \
              release-finalize/loomle-darwin.zip \
              release-finalize/loomle-windows.zip \
              release-finalize/loomle-manifest-darwin.json \
              release-finalize/loomle-manifest-windows.json \
              release-finalize/loomle-manifest.json
          else
            gh release upload loomle-latest release-finalize/loomle-darwin.zip \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release upload loomle-latest release-finalize/loomle-windows.zip \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release upload loomle-latest release-finalize/loomle-manifest-darwin.json \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release upload loomle-latest release-finalize/loomle-manifest-windows.json \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release upload loomle-latest release-finalize/loomle-manifest.json \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi

      - name: Mark Tag Release As GitHub Latest
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          gh release edit "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --latest
