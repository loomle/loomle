name: Verify LOOMLE (Windows)

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  verify-windows:
    runs-on: [self-hosted, Windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Release Version Strings
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          $script = Join-Path $env:GITHUB_WORKSPACE "tools\check_release_versions.py"
          $arguments = @($script)
          if ($env:GITHUB_REF_NAME -and $env:GITHUB_REF_NAME.StartsWith("v")) {
            $arguments += @("--expected-version", $env:GITHUB_REF_NAME.Substring(1))
          }
          python $arguments
          if ($LASTEXITCODE -ne 0) {
            throw "check_release_versions.py failed with exit code $LASTEXITCODE"
          }

      - name: Resolve Unreal Engine Root (Windows)
        id: ue_root_windows
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        env:
          UE_FROM_VARS: ${{ vars.UE_5_7_ROOT_WINDOWS }}
        run: |
          $candidate = ""
          if ($env:UE_FROM_VARS) {
            $candidate = $env:UE_FROM_VARS
          } elseif ($env:UE_5_7_ROOT_WINDOWS) {
            $candidate = $env:UE_5_7_ROOT_WINDOWS
          } else {
            $candidate = "C:\Program Files\Epic Games\UE_5.7"
          }

          $runUat = Join-Path $candidate "Engine\Build\BatchFiles\RunUAT.bat"
          if (-not (Test-Path -LiteralPath $runUat)) {
            throw "RunUAT.bat not found. Set UE_5_7_ROOT_WINDOWS (repo var or runner env). Tried: $runUat"
          }

          $ueEditor = Join-Path $candidate "Engine\Binaries\Win64\UnrealEditor.exe"
          if (-not (Test-Path -LiteralPath $ueEditor)) {
            throw "UnrealEditor.exe not found: $ueEditor"
          }

          "ue_root=$candidate" >> $env:GITHUB_OUTPUT
          "run_uat=$runUat" >> $env:GITHUB_OUTPUT
          "ue_editor=$ueEditor" >> $env:GITHUB_OUTPUT

      - name: Resolve Test Project Root
        id: test_project
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        env:
          TEST_ROOT_FROM_VARS: ${{ vars.LOOMLE_TEST_PROJECT_ROOT_WINDOWS }}
        run: |
          if ($env:TEST_ROOT_FROM_VARS) {
            $testRoot = $env:TEST_ROOT_FROM_VARS
          } elseif ($env:LOOMLE_TEST_PROJECT_ROOT_WINDOWS) {
            $testRoot = $env:LOOMLE_TEST_PROJECT_ROOT_WINDOWS
          } else {
            $workspaceRoot = (Resolve-Path (Join-Path $env:GITHUB_WORKSPACE "..\..")).Path
            $testRoot = Join-Path $workspaceRoot "lrh\LoomleRunnerHostWin"
          }

          & (Join-Path $env:GITHUB_WORKSPACE "tools\runner_init_host_project.ps1") -ProjectRoot $testRoot -ProjectName "LoomleRunnerHostWin"

          if (-not (Test-Path -LiteralPath $testRoot)) {
            throw "Test project root not found: $testRoot"
          }

          $uproject = Get-ChildItem -LiteralPath $testRoot -Filter *.uproject | Select-Object -First 1
          if ($null -eq $uproject) {
            throw "No .uproject found under $testRoot"
          }

          "test_root=$testRoot" >> $env:GITHUB_OUTPUT
          "uproject=$($uproject.FullName)" >> $env:GITHUB_OUTPUT

      - name: Stop Stale Unreal Editor Before Plugin Sync
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          $uproject = "${{ steps.test_project.outputs.uproject }}"
          Get-CimInstance Win32_Process -Filter "Name = 'UnrealEditor.exe'" |
            Where-Object { $_.CommandLine -like "*$uproject*" } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force }

      - name: Ensure Rust Toolchain
        timeout-minutes: 20
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          Write-Host "Checking cargo availability..."

          function Test-Cargo([string]$CargoPath) {
            & $CargoPath --version
            return ($LASTEXITCODE -eq 0)
          }

          function Ensure-DefaultRustToolchain([string]$CargoPath) {
            $cargoBin = Split-Path -Parent $CargoPath
            $rustupExe = Join-Path $cargoBin "rustup.exe"
            if (-not (Test-Path -LiteralPath $rustupExe)) {
              return $false
            }

            Write-Host "cargo exists but no active default Rust toolchain is configured; installing stable with minimal profile..."
            & $rustupExe toolchain install stable --profile minimal
            if ($LASTEXITCODE -ne 0) {
              throw "rustup toolchain install stable --profile minimal failed with exit code $LASTEXITCODE"
            }

            & $rustupExe default stable
            if ($LASTEXITCODE -ne 0) {
              throw "rustup default stable failed with exit code $LASTEXITCODE"
            }

            return $true
          }

          $candidateBins = @()
          if ($env:CARGO_HOME) {
            $candidateBins += (Join-Path $env:CARGO_HOME "bin")
          }
          if ($env:USERPROFILE) {
            $candidateBins += (Join-Path $env:USERPROFILE ".cargo\bin")
          }
          if ($env:HOMEDRIVE -and $env:HOMEPATH) {
            $candidateBins += (Join-Path "$env:HOMEDRIVE$env:HOMEPATH" ".cargo\bin")
          }
          $candidateBins = $candidateBins | Select-Object -Unique

          foreach ($bin in $candidateBins) {
            $cargoExe = Join-Path $bin "cargo.exe"
            if (Test-Path -LiteralPath $cargoExe) {
              Write-Host "Using existing cargo at $cargoExe"
              $bin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              if (Test-Cargo $cargoExe) {
                exit 0
              }
              if ((Ensure-DefaultRustToolchain $cargoExe) -and (Test-Cargo $cargoExe)) {
                exit 0
              }
            }
          }

          $cargoCmd = Get-Command cargo -ErrorAction SilentlyContinue
          if ($cargoCmd) {
            Write-Host "Using cargo from PATH: $($cargoCmd.Source)"
            if (Test-Cargo $cargoCmd.Source) {
              exit 0
            }
            if ((Ensure-DefaultRustToolchain $cargoCmd.Source) -and (Test-Cargo $cargoCmd.Source)) {
              exit 0
            }
          }

          Write-Host "cargo not found; installing Rust toolchain..."
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          $rustupInit = Join-Path $env:RUNNER_TEMP "rustup-init.exe"
          Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile $rustupInit
          $rustup = Start-Process -FilePath $rustupInit -ArgumentList "-y --profile minimal --default-toolchain stable" -Wait -PassThru -NoNewWindow
          if ($rustup.ExitCode -ne 0) {
            throw "rustup-init failed with exit code $($rustup.ExitCode)"
          }

          $cargoHome = if ($env:CARGO_HOME) { $env:CARGO_HOME } else { Join-Path $env:USERPROFILE ".cargo" }
          $cargoBin = Join-Path $cargoHome "bin"
          $cargoExe = Join-Path $cargoBin "cargo.exe"
          if (-not (Test-Path -LiteralPath $cargoExe)) {
            throw "cargo.exe not found after Rust setup: $cargoExe"
          }

          $cargoBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $cargoExe --version

      - name: Run Rust Unit Tests
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          Push-Location (Join-Path $env:GITHUB_WORKSPACE "mcp\server")
          cargo test
          Pop-Location

          Push-Location (Join-Path $env:GITHUB_WORKSPACE "mcp\client")
          cargo test
          Pop-Location

      - name: Build Plugin From Current Commit And Sync To Test Project
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          $plugin = Join-Path $env:GITHUB_WORKSPACE "engine\LoomleBridge\LoomleBridge.uplugin"
          if (-not (Test-Path -LiteralPath $plugin)) {
            throw "Plugin descriptor not found: $plugin"
          }

          $packageDir = Join-Path $env:RUNNER_TEMP "LoomleBridge_Gating_Windows"
          $pluginDst = Join-Path "${{ steps.test_project.outputs.test_root }}" "Plugins\LoomleBridge"
          if (Test-Path -LiteralPath $packageDir) {
            Remove-Item -LiteralPath $packageDir -Recurse -Force
          }
          if (Test-Path -LiteralPath $pluginDst) {
            Remove-Item -LiteralPath $pluginDst -Recurse -Force
          }

          & "${{ steps.ue_root_windows.outputs.run_uat }}" BuildPlugin "-Plugin=$plugin" "-Package=$packageDir" "-TargetPlatforms=Win64" -Rocket
          if ($LASTEXITCODE -ne 0) {
            throw "BuildPlugin failed with exit code $LASTEXITCODE"
          }

          New-Item -ItemType Directory -Force -Path $pluginDst | Out-Null
          Copy-Item -Path (Join-Path $packageDir "*") -Destination $pluginDst -Recurse -Force

      - name: Build MCP Server Binary (Release) And Sync To Test Project Plugin
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          Push-Location (Join-Path $env:GITHUB_WORKSPACE "mcp\server")
          cargo build --release
          Pop-Location

          Push-Location (Join-Path $env:GITHUB_WORKSPACE "mcp\client")
          cargo build --release
          Pop-Location

          $serverSrc = Join-Path $env:GITHUB_WORKSPACE "mcp\server\target\release\loomle_mcp_server.exe"
          $clientSrc = Join-Path $env:GITHUB_WORKSPACE "mcp\client\target\release\loomle.exe"
          $workspaceSrc = Join-Path $env:GITHUB_WORKSPACE "workspace\Loomle"
          if (-not (Test-Path -LiteralPath $serverSrc)) {
            throw "MCP server binary missing: $serverSrc"
          }
          if (-not (Test-Path -LiteralPath $clientSrc)) {
            throw "LOOMLE client binary missing: $clientSrc"
          }
          if (-not (Test-Path -LiteralPath $workspaceSrc)) {
            throw "LOOMLE workspace missing: $workspaceSrc"
          }

          $pluginServer = Join-Path "${{ steps.test_project.outputs.test_root }}" "Plugins\LoomleBridge\Tools\mcp\windows\loomle_mcp_server.exe"
          $workspaceDst = Join-Path "${{ steps.test_project.outputs.test_root }}" "Loomle"
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $pluginServer) | Out-Null
          if (Test-Path -LiteralPath $workspaceDst) {
            Remove-Item -LiteralPath $workspaceDst -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $workspaceDst | Out-Null
          Copy-Item -Path (Join-Path $workspaceSrc "*") -Destination $workspaceDst -Recurse -Force
          Copy-Item -LiteralPath $serverSrc -Destination $pluginServer -Force
          Copy-Item -LiteralPath $clientSrc -Destination (Join-Path $workspaceDst "loomle.exe") -Force

      - name: Stage Release Inputs
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          $releaseInputs = Join-Path $env:RUNNER_TEMP "loomle-release-inputs-windows"
          $pluginSrc = Join-Path $env:RUNNER_TEMP "LoomleBridge_Gating_Windows"
          $workspaceSrc = Join-Path $env:GITHUB_WORKSPACE "workspace\Loomle"
          $serverSrc = Join-Path $env:GITHUB_WORKSPACE "mcp\server\target\release\loomle_mcp_server.exe"
          $clientSrc = Join-Path $env:GITHUB_WORKSPACE "mcp\client\target\release\loomle.exe"

          if (-not (Test-Path -LiteralPath $pluginSrc)) {
            throw "Packaged plugin missing: $pluginSrc"
          }
          if (-not (Test-Path -LiteralPath $workspaceSrc)) {
            throw "Workspace missing: $workspaceSrc"
          }
          if (-not (Test-Path -LiteralPath $serverSrc)) {
            throw "MCP server binary missing: $serverSrc"
          }
          if (-not (Test-Path -LiteralPath $clientSrc)) {
            throw "Client binary missing: $clientSrc"
          }

          Remove-Item -LiteralPath $releaseInputs -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path `
            (Join-Path $releaseInputs "plugin\LoomleBridge\Tools\mcp\windows"), `
            (Join-Path $releaseInputs "workspace\Loomle"), `
            (Join-Path $releaseInputs "mcp\client\windows") | Out-Null

          Copy-Item -Path (Join-Path $pluginSrc "*") -Destination (Join-Path $releaseInputs "plugin\LoomleBridge") -Recurse -Force
          Copy-Item -Path (Join-Path $workspaceSrc "*") -Destination (Join-Path $releaseInputs "workspace\Loomle") -Recurse -Force
          Copy-Item -LiteralPath $serverSrc -Destination (Join-Path $releaseInputs "plugin\LoomleBridge\Tools\mcp\windows\loomle_mcp_server.exe") -Force
          Copy-Item -LiteralPath $clientSrc -Destination (Join-Path $releaseInputs "workspace\Loomle\loomle.exe") -Force
          Copy-Item -LiteralPath $clientSrc -Destination (Join-Path $releaseInputs "mcp\client\windows\loomle.exe") -Force

      - name: Upload Release Inputs
        uses: actions/upload-artifact@v4
        with:
          name: release-verify-windows-inputs
          path: ${{ runner.temp }}/loomle-release-inputs-windows
          if-no-files-found: error

      - name: Restart Unreal Editor For Verification
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          $uproject = "${{ steps.test_project.outputs.uproject }}"
          Get-CimInstance Win32_Process -Filter "Name = 'UnrealEditor.exe'" |
            Where-Object { $_.CommandLine -like "*$uproject*" } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force }
          Start-Sleep -Seconds 2
          $ueArgs = @($uproject, "-nullrhi", "-unattended", "-nosplash", "-nop4", "-NoSound")
          Start-Process -FilePath "${{ steps.ue_root_windows.outputs.ue_editor }}" -ArgumentList $ueArgs

      - name: Wait For Bridge And Run Smoke Test
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          $deadline = (Get-Date).AddMinutes(4)
          while ((Get-Date) -lt $deadline) {
            python tests/e2e/test_bridge_smoke.py --project-root "${{ steps.test_project.outputs.test_root }}"
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }
            Start-Sleep -Seconds 5
          }

          throw "TIMEOUT waiting for bridge smoke test to pass"

      - name: Run Regression Integration Test
        timeout-minutes: 15
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          $projectRoot = "${{ steps.test_project.outputs.test_root }}"
          $uproject = "${{ steps.test_project.outputs.uproject }}"
          $ueEditor = "${{ steps.ue_root_windows.outputs.ue_editor }}"
          $env:LOOMLE_SKIP_MATERIAL_VISUAL_REGRESSION = "1"
          $passed = $false

          for ($attempt = 1; $attempt -le 2; $attempt++) {
            Push-Location $env:GITHUB_WORKSPACE
            python tests/e2e/test_bridge_regression.py --project-root $projectRoot
            $exitCode = $LASTEXITCODE
            Pop-Location

            if ($exitCode -eq 0) {
              $passed = $true
              break
            }

            if ($attempt -lt 2) {
              Write-Warning "Regression attempt $attempt failed (exit=$exitCode), restarting Unreal Editor and retrying..."
              Get-CimInstance Win32_Process -Filter "Name = 'UnrealEditor.exe'" |
                Where-Object { $_.CommandLine -like "*$uproject*" } |
                ForEach-Object { Stop-Process -Id $_.ProcessId -Force }
              Start-Sleep -Seconds 3
              $ueArgs = @($uproject, "-nullrhi", "-unattended", "-nosplash", "-nop4", "-NoSound")
              Start-Process -FilePath $ueEditor -ArgumentList $ueArgs
              Start-Sleep -Seconds 10
            }
          }

          if (-not $passed) {
            throw "Regression integration test failed after retry"
          }

      - name: Tail Unreal Project Log On Failure
        if: failure()
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          $logDir = Join-Path "${{ steps.test_project.outputs.test_root }}" "Saved\Logs"
          if (-not (Test-Path -LiteralPath $logDir)) {
            Write-Warning "Unreal log directory not found: $logDir"
            exit 0
          }

          $latestLog = Get-ChildItem -LiteralPath $logDir -Filter *.log |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if ($null -eq $latestLog) {
            Write-Warning "No Unreal log files found under $logDir"
            exit 0
          }

          Write-Host "===== Tail of $($latestLog.FullName) ====="
          Get-Content -LiteralPath $latestLog.FullName -Tail 200

      - name: Upload Unreal Project Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-verify-windows-logs
          path: ${{ steps.test_project.outputs.test_root }}\Saved\Logs\*.log
          if-no-files-found: ignore

      - name: Stop Unreal Editor
        if: always()
        shell: powershell -NoProfile -ExecutionPolicy Bypass -command ". '{0}'"
        run: |
          $uproject = "${{ steps.test_project.outputs.uproject }}"
          Get-CimInstance Win32_Process -Filter "Name = 'UnrealEditor.exe'" |
            Where-Object { $_.CommandLine -like "*$uproject*" } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force }
