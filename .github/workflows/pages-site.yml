name: Deploy Pages Site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "client/install.sh"
      - "client/install.ps1"
      - ".github/workflows/pages-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: site
          bundler-cache: true

      - name: Sync published install scripts
        run: |
          cp client/install.sh site/install.sh
          cp client/install.ps1 site/install.ps1

      - name: Build site
        working-directory: site
        run: bundle exec jekyll build --destination _site

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
