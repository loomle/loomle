name: Build Loomle Plugin (Win64 + Mac)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'Plugins/LoomleBridge/**'
      - '.github/workflows/build-plugin.yml'

permissions:
  contents: write

jobs:
  build-win64:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Unreal Engine Root (Windows)
        id: ue_root_win
        shell: pwsh
        env:
          UE_FROM_VARS: ${{ vars.UE_5_7_ROOT_WIN }}
        run: |
          $candidate = $null
          if ($env:UE_FROM_VARS) {
            $candidate = $env:UE_FROM_VARS
          } elseif ($env:UE_5_7_ROOT_WIN) {
            $candidate = $env:UE_5_7_ROOT_WIN
          } else {
            $candidate = 'C:\Program Files\Epic Games\UE_5.7'
          }

          $runUat = Join-Path $candidate 'Engine\Build\BatchFiles\RunUAT.bat'
          if (-not (Test-Path $runUat)) {
            Write-Error "RunUAT.bat not found. Set UE_5_7_ROOT_WIN (repo var or runner env). Tried: $runUat"
            exit 1
          }

          "ue_root=$candidate" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "run_uat=$runUat" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Plugin (Win64)
        id: build_win
        shell: pwsh
        run: |
          $plugin = Join-Path $env:GITHUB_WORKSPACE 'Plugins\LoomleBridge\LoomleBridge.uplugin'
          if (-not (Test-Path $plugin)) {
            Write-Error "Plugin descriptor not found: $plugin"
            exit 1
          }

          $packageDir = Join-Path $env:RUNNER_TEMP 'LoomleBridge_Win64'
          if (Test-Path $packageDir) {
            Remove-Item -Recurse -Force $packageDir
          }

          & "${{ steps.ue_root_win.outputs.run_uat }}" BuildPlugin `
            -Plugin="$plugin" `
            -Package="$packageDir" `
            -TargetPlatforms=Win64 `
            -Rocket

          if ($LASTEXITCODE -ne 0) {
            Write-Error "BuildPlugin failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

          $meta = @{
            platform = 'Win64'
            built_at_utc = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
            ue_root = "${{ steps.ue_root_win.outputs.ue_root }}"
            commit = "${{ github.sha }}"
            runner = "${{ runner.name }}"
          } | ConvertTo-Json -Depth 4
          $meta | Out-File -FilePath (Join-Path $packageDir 'build-metadata.json') -Encoding utf8

          $zipPath = Join-Path $env:RUNNER_TEMP 'LoomleBridge-Win64.zip'
          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }
          Compress-Archive -Path (Join-Path $packageDir '*') -DestinationPath $zipPath -CompressionLevel Optimal

          "package_dir=$packageDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload Artifact (Win64 Package)
        uses: actions/upload-artifact@v4
        with:
          name: LoomleBridge-Win64-${{ github.run_number }}
          path: ${{ steps.build_win.outputs.package_dir }}
          if-no-files-found: error

      - name: Upload Artifact (Win64 Zip)
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-win64
          path: ${{ steps.build_win.outputs.zip_path }}
          if-no-files-found: error

  build-mac:
    runs-on: [self-hosted, macOS]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Unreal Engine Root (Mac)
        id: ue_root_mac
        shell: bash
        env:
          UE_FROM_VARS: ${{ vars.UE_5_7_ROOT_MAC }}
        run: |
          set -euo pipefail
          candidate=""
          if [[ -n "${UE_FROM_VARS:-}" ]]; then
            candidate="$UE_FROM_VARS"
          elif [[ -n "${UE_5_7_ROOT_MAC:-}" ]]; then
            candidate="$UE_5_7_ROOT_MAC"
          else
            candidate="/Users/Shared/Epic Games/UE_5.7"
          fi

          run_uat="$candidate/Engine/Build/BatchFiles/RunUAT.sh"
          if [[ ! -x "$run_uat" ]]; then
            echo "RunUAT.sh not found. Set UE_5_7_ROOT_MAC (repo var or runner env). Tried: $run_uat" >&2
            exit 1
          fi

          {
            echo "ue_root=$candidate"
            echo "run_uat=$run_uat"
          } >> "$GITHUB_OUTPUT"

      - name: Build Plugin (Mac)
        id: build_mac
        shell: bash
        run: |
          set -euo pipefail
          plugin="$GITHUB_WORKSPACE/Plugins/LoomleBridge/LoomleBridge.uplugin"
          [[ -f "$plugin" ]] || { echo "Plugin descriptor not found: $plugin" >&2; exit 1; }

          package_dir="$RUNNER_TEMP/LoomleBridge_Mac"
          rm -rf "$package_dir"

          "${{ steps.ue_root_mac.outputs.run_uat }}" BuildPlugin \
            -Plugin="$plugin" \
            -Package="$package_dir" \
            -TargetPlatforms=Mac \
            -Rocket

          cat > "$package_dir/build-metadata.json" <<JSON
          {
            "platform": "Mac",
            "built_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "ue_root": "${{ steps.ue_root_mac.outputs.ue_root }}",
            "commit": "${{ github.sha }}",
            "runner": "${{ runner.name }}"
          }
          JSON

          zip_path="$RUNNER_TEMP/LoomleBridge-Mac.zip"
          rm -f "$zip_path"
          (
            cd "$package_dir"
            zip -r "$zip_path" .
          )

          echo "package_dir=$package_dir" >> "$GITHUB_OUTPUT"
          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"

      - name: Upload Artifact (Mac Package)
        uses: actions/upload-artifact@v4
        with:
          name: LoomleBridge-Mac-${{ github.run_number }}
          path: ${{ steps.build_mac.outputs.package_dir }}
          if-no-files-found: error

      - name: Upload Artifact (Mac Zip)
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-mac
          path: ${{ steps.build_mac.outputs.zip_path }}
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-win64, build-mac]
    runs-on: ubuntu-latest

    steps:
      - name: Download Win64 Release Asset
        uses: actions/download-artifact@v4
        with:
          name: release-asset-win64
          path: release-assets

      - name: Download Mac Release Asset
        uses: actions/download-artifact@v4
        with:
          name: release-asset-mac
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/LoomleBridge-Win64.zip
            release-assets/LoomleBridge-Mac.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          make_latest: true
