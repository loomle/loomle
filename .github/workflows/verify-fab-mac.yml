name: Verify Loomle Fab Plugin (Mac)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-loomle-fab-mac
  cancel-in-progress: false

jobs:
  verify-fab-mac:
    runs-on: [self-hosted, macOS]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Require Apple Silicon Runner
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(uname -m)" == "arm64" ]] || {
            echo "The accepted darwin-arm64 Client must be built on an Apple Silicon runner." >&2
            exit 1
          }

      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Verify Workspaces And Fab Assembler
        run: npm test

      - name: Build And Test Standalone Client
        run: |
          npm run build:executable -- --target darwin-arm64
          npm run test:executable -- --target darwin-arm64

      - name: Assemble Fab Plugin
        id: assemble
        shell: bash
        run: |
          set -euo pipefail
          staging="$RUNNER_TEMP/loomle-fab-darwin-arm64"
          node packaging/fab/assemble.mjs \
            --repo-root "$GITHUB_WORKSPACE" \
            --output-dir "$staging" \
            --target darwin-arm64
          echo "staging=$staging" >> "$GITHUB_OUTPUT"

      - name: Resolve Unreal Engine Root
        id: ue
        shell: bash
        env:
          UE_FROM_VARS: ${{ vars.UE_5_7_ROOT_MAC }}
        run: |
          set -euo pipefail
          candidate="${UE_FROM_VARS:-${UE_5_7_ROOT_MAC:-/Users/Shared/Epic Games/UE_5.7}}"
          run_uat="$candidate/Engine/Build/BatchFiles/RunUAT.sh"
          [[ -x "$run_uat" ]] || {
            echo "RunUAT.sh not found: $run_uat" >&2
            exit 1
          }
          echo "ue_root=$candidate" >> "$GITHUB_OUTPUT"
          echo "run_uat=$run_uat" >> "$GITHUB_OUTPUT"

      - name: Compile Same-Commit Automation Plugin
        id: automation-package
        timeout-minutes: 30
        shell: bash
        env:
          RUN_UAT: ${{ steps.ue.outputs.run_uat }}
        run: |
          set -euo pipefail
          package="$RUNNER_TEMP/loomle-automation-buildplugin-darwin-arm64"
          rm -rf "$package"
          "$RUN_UAT" BuildPlugin \
            -Plugin="$GITHUB_WORKSPACE/engine/LoomleBridge/LoomleBridge.uplugin" \
            -Package="$package" \
            -PackageAppendPluginSubdir \
            -TargetPlatforms=Mac \
            -Architecture_Mac=arm64 \
            -Rocket
          test -d "$package/LoomleBridge/Source/LoomleBridge/Private/Tests"
          echo "plugin=$package/LoomleBridge" >> "$GITHUB_OUTPUT"

      - name: Require Idle Unreal Editor Before Automation
        shell: bash
        run: |
          set -euo pipefail
          if pgrep -x UnrealEditor >/dev/null || pgrep -x UnrealEditor-Cmd >/dev/null; then
            echo "The self-hosted runner already has an Unreal Editor process." >&2
            pgrep -fl 'UnrealEditor|UnrealEditor-Cmd' >&2 || true
            exit 1
          fi

      - name: Run Complete UE Automation
        timeout-minutes: 35
        shell: bash
        env:
          UE_ROOT: ${{ steps.ue.outputs.ue_root }}
          AUTOMATION_PLUGIN: ${{ steps.automation-package.outputs.plugin }}
        run: |
          set -euo pipefail
          results="$RUNNER_TEMP/loomle-automation-results-darwin-arm64"
          rm -rf "$results"
          npm run test:ue-automation -- \
            --ue-root "$UE_ROOT" \
            --project-template "$GITHUB_WORKSPACE/tests/fixtures/ue/LoomleTestHost" \
            --plugin-dir "$AUTOMATION_PLUGIN" \
            --output-dir "$results" \
            --target darwin-arm64
          node -e '
            const result = JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8"));
            if (result.status !== "passed" || result.commit !== process.env.GITHUB_SHA) {
              throw new Error("UE Automation result does not match the checked-out commit.");
            }
          ' "$results/result.json"

      - name: Compile Staged Plugin
        id: package
        timeout-minutes: 30
        shell: bash
        env:
          RUN_UAT: ${{ steps.ue.outputs.run_uat }}
          STAGING: ${{ steps.assemble.outputs.staging }}
        run: |
          set -euo pipefail
          package="$RUNNER_TEMP/loomle-fab-buildplugin-darwin-arm64"
          rm -rf "$package"
          "$RUN_UAT" BuildPlugin \
            -Plugin="$STAGING/LoomleBridge/LoomleBridge.uplugin" \
            -Package="$package" \
            -PackageAppendPluginSubdir \
            -TargetPlatforms=Mac \
            -Architecture_Mac=arm64 \
            -Rocket
          mkdir -p "$package/LoomleBridge/Content"
          echo "package=$package" >> "$GITHUB_OUTPUT"

      - name: Audit Packaged Client
        shell: bash
        env:
          PACKAGE: ${{ steps.package.outputs.package }}
          STAGING: ${{ steps.assemble.outputs.staging }}
        run: |
          set -euo pipefail
          packaged_plugin="$PACKAGE/LoomleBridge"
          source_client="$STAGING/LoomleBridge/Resources/Loomle/darwin-arm64/loomle"
          packaged_client="$packaged_plugin/Resources/Loomle/darwin-arm64/loomle"
          [[ -x "$packaged_client" ]] || {
            echo "BuildPlugin output is missing the executable Client: $packaged_client" >&2
            exit 1
          }
          [[ ! -e "$packaged_plugin/Resources/MCP" ]] || {
            echo "BuildPlugin output contains retired Resources/MCP." >&2
            exit 1
          }
          [[ ! -e "$packaged_plugin/Resources/Loomle/darwin-arm64/build.json" ]] || {
            echo "BuildPlugin output must not ship the internal Client build receipt." >&2
            exit 1
          }
          for forbidden_path in \
            Source/LoomleBridge/Private/Tests \
            Intermediate \
            Saved; do
            [[ ! -e "$packaged_plugin/$forbidden_path" ]] || {
              echo "BuildPlugin output contains forbidden release path: $forbidden_path" >&2
              exit 1
            }
          done
          [[ -d "$packaged_plugin/Content" ]] || {
            echo "BuildPlugin output is missing the required empty Content directory." >&2
            exit 1
          }
          [[ -z "$(find "$packaged_plugin/Content" -mindepth 1 -print -quit)" ]] || {
            echo "BuildPlugin output Content directory must be empty." >&2
            exit 1
          }
          for required_file in LICENSE THIRD_PARTY_NOTICES.txt; do
            [[ -s "$packaged_plugin/$required_file" ]] || {
              echo "BuildPlugin output is missing $required_file." >&2
              exit 1
            }
            [[ "$(shasum -a 256 "$STAGING/LoomleBridge/$required_file" | awk '{print $1}')" == \
               "$(shasum -a 256 "$packaged_plugin/$required_file" | awk '{print $1}')" ]] || {
              echo "BuildPlugin changed $required_file." >&2
              exit 1
            }
          done
          [[ -f "$packaged_plugin/Config/FilterPlugin.ini" ]] || {
            echo "BuildPlugin output is missing Config/FilterPlugin.ini." >&2
            exit 1
          }
          client_target_count="$(find "$packaged_plugin/Resources/Loomle" -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')"
          [[ "$client_target_count" == "1" ]] || {
            echo "BuildPlugin output must contain exactly one Client target." >&2
            exit 1
          }
          [[ "$(shasum -a 256 "$source_client" | awk '{print $1}')" == \
             "$(shasum -a 256 "$packaged_client" | awk '{print $1}')" ]] || {
            echo "BuildPlugin changed the bundled Client." >&2
            exit 1
          }
          "$packaged_client" --help

          descriptor="$packaged_plugin/LoomleBridge.uplugin"
          node -e '
            const descriptor = JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8"));
            const moduleNames = descriptor.Modules?.map((entry) => entry.Name);
            const module = descriptor.Modules?.[0];
            const same = (actual, expected) => JSON.stringify(actual) === JSON.stringify(expected);
            if (descriptor.Installed !== true
                || !same(descriptor.SupportedTargetPlatforms, ["Mac"])
                || !same(moduleNames, ["LoomleBridge"])
                || !same(module?.PlatformAllowList, ["Mac"])
                || module?.PlatformArchitectureAllowList !== undefined) {
              throw new Error("BuildPlugin output has an invalid target descriptor contract.");
            }
          ' "$descriptor"

          bridge_binary="$packaged_plugin/Binaries/Mac/UnrealEditor-LoomleBridge.dylib"
          [[ -f "$bridge_binary" ]] || {
            echo "BuildPlugin output is missing the Mac Bridge binary: $bridge_binary" >&2
            exit 1
          }
          [[ "$(/usr/bin/lipo -archs "$bridge_binary")" == "arm64" ]] || {
            echo "BuildPlugin output is not arm64-only: $bridge_binary" >&2
            /usr/bin/lipo -archs "$bridge_binary" >&2
            exit 1
          }

      - name: Archive Verified BuildPlugin Output
        id: archive
        shell: bash
        env:
          PACKAGE: ${{ steps.package.outputs.package }}
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/loomle-fab-plugin-darwin-arm64.zip"
          rm -f "$archive"
          cd "$PACKAGE"
          /usr/bin/zip -qry "$archive" LoomleBridge
          archive_entries="$RUNNER_TEMP/loomle-fab-archive-entries-darwin-arm64.txt"
          /usr/bin/unzip -Z1 "$archive" > "$archive_entries"
          grep -Fxq 'LoomleBridge/Resources/Loomle/darwin-arm64/loomle' "$archive_entries"
          grep -Fxq 'LoomleBridge/Content/' "$archive_entries"
          grep -Fxq 'LoomleBridge/LICENSE' "$archive_entries"
          grep -Fxq 'LoomleBridge/THIRD_PARTY_NOTICES.txt' "$archive_entries"
          if grep -Eq '^LoomleBridge/Resources/MCP(/|$)' "$archive_entries"; then
            echo "Fab archive contains retired Resources/MCP." >&2
            exit 1
          fi
          if grep -Fxq 'LoomleBridge/Resources/Loomle/darwin-arm64/build.json' "$archive_entries"; then
            echo "Fab archive contains the internal Client build receipt." >&2
            exit 1
          fi
          for forbidden_path in \
            Source/LoomleBridge/Private/Tests \
            Intermediate \
            Saved; do
            if grep -Eq "^LoomleBridge/$forbidden_path(/|$)" "$archive_entries"; then
              echo "Fab archive contains forbidden release path: $forbidden_path" >&2
              exit 1
            fi
          done
          if grep -E '^LoomleBridge/Content/.+' "$archive_entries"; then
            echo "Fab archive Content directory must be empty." >&2
            exit 1
          fi

          audit="$RUNNER_TEMP/loomle-fab-archive-audit-darwin-arm64"
          rm -rf "$audit"
          mkdir -p "$audit"
          /usr/bin/unzip -q "$archive" -d "$audit"
          packaged_plugin="$PACKAGE/LoomleBridge"
          extracted_plugin="$audit/LoomleBridge"
          for relative_path in \
            LoomleBridge.uplugin \
            Config/FilterPlugin.ini \
            LICENSE \
            THIRD_PARTY_NOTICES.txt \
            Resources/Loomle/darwin-arm64/loomle \
            Binaries/Mac/UnrealEditor-LoomleBridge.dylib; do
            [[ "$(shasum -a 256 "$packaged_plugin/$relative_path" | awk '{print $1}')" == \
               "$(shasum -a 256 "$extracted_plugin/$relative_path" | awk '{print $1}')" ]] || {
              echo "Fab archive changed or omitted $relative_path." >&2
              exit 1
            }
          done
          [[ -x "$extracted_plugin/Resources/Loomle/darwin-arm64/loomle" ]] || {
            echo "Fab archive did not preserve the Client executable bit." >&2
            exit 1
          }
          [[ "$(/usr/bin/lipo -archs "$extracted_plugin/Binaries/Mac/UnrealEditor-LoomleBridge.dylib")" == "arm64" ]] || {
            echo "Fab archive Bridge is not arm64-only." >&2
            exit 1
          }
          node -e '
            const descriptor = JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8"));
            const moduleNames = descriptor.Modules?.map((entry) => entry.Name);
            if (JSON.stringify(moduleNames) !== JSON.stringify(["LoomleBridge"])
                || descriptor.Modules?.[0]?.PlatformArchitectureAllowList !== undefined) {
              throw new Error("Fab archive descriptor has an invalid module contract.");
            }
          ' "$extracted_plugin/LoomleBridge.uplugin"
          archive_sha="$archive.sha256"
          archive_hash="$(shasum -a 256 "$archive" | awk '{print $1}')"
          printf '%s  %s\n' "$archive_hash" "$(basename "$archive")" > "$archive_sha"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "archive_sha=$archive_sha" >> "$GITHUB_OUTPUT"

      - name: Require Idle Unreal Editor Before Packaged End-To-End
        shell: bash
        run: |
          set -euo pipefail
          if pgrep -x UnrealEditor >/dev/null || pgrep -x UnrealEditor-Cmd >/dev/null; then
            echo "The self-hosted runner already has an Unreal Editor process." >&2
            pgrep -fl 'UnrealEditor|UnrealEditor-Cmd' >&2 || true
            exit 1
          fi

      - name: Run Packaged End-To-End
        timeout-minutes: 35
        shell: bash
        env:
          UE_ROOT: ${{ steps.ue.outputs.ue_root }}
          ARCHIVE: ${{ steps.archive.outputs.archive }}
        run: |
          set -euo pipefail
          results="$RUNNER_TEMP/loomle-packaged-e2e-results-darwin-arm64"
          rm -rf "$results"
          npm run test:packaged-e2e -- \
            --ue-root "$UE_ROOT" \
            --project-template "$GITHUB_WORKSPACE/tests/fixtures/ue/LoomleTestHost" \
            --plugin-archive "$ARCHIVE" \
            --output-dir "$results" \
            --target darwin-arm64
          archive_sha="$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')"
          node -e '
            const result = JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8"));
            if (result.status !== "passed"
                || result.commit !== process.env.GITHUB_SHA
                || result.archiveSha256 !== process.argv[2]) {
              throw new Error("Packaged E2E result does not match the checked-out commit and exact release archive.");
            }
          ' "$results/result.json" "$archive_sha"

      - name: Upload Native Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: loomle-native-test-results-darwin-arm64
          path: |
            ${{ runner.temp }}/loomle-automation-results-darwin-arm64
            ${{ runner.temp }}/loomle-packaged-e2e-results-darwin-arm64
          if-no-files-found: warn

      - name: Upload QA Artifact
        uses: actions/upload-artifact@v7
        with:
          name: loomle-fab-plugin-darwin-arm64
          path: |
            ${{ steps.archive.outputs.archive }}
            ${{ steps.archive.outputs.archive_sha }}
          if-no-files-found: error
