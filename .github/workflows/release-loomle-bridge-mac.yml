name: Release LOOMLE (Mac)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: loomle-release-mac-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify-mac:
    uses: ./.github/workflows/release-verify-mac.yml
    secrets: inherit

  release-mac:
    needs: verify-mac
    runs-on: [self-hosted, macOS]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure Tag Commit Is On Main
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if git fetch origin main --depth=100 --no-tags; then
              break
            fi
            if [[ "$attempt" == "3" ]]; then
              echo "Failed to fetch origin/main after $attempt attempts" >&2
              exit 1
            fi
            sleep $((attempt * 5))
          done
          tag_commit="$(git rev-parse HEAD)"
          git merge-base --is-ancestor "$tag_commit" origin/main || {
            echo "Release tag commit $tag_commit is not reachable from origin/main" >&2
            exit 1
          }

      - name: Resolve Unreal Engine Root (Mac)
        id: ue_root_mac
        shell: bash
        env:
          UE_FROM_VARS: ${{ vars.UE_5_7_ROOT_MAC }}
        run: |
          set -euo pipefail
          candidate=""
          if [[ -n "${UE_FROM_VARS:-}" ]]; then
            candidate="$UE_FROM_VARS"
          elif [[ -n "${UE_5_7_ROOT_MAC:-}" ]]; then
            candidate="$UE_5_7_ROOT_MAC"
          else
            candidate="/Users/Shared/Epic Games/UE_5.7"
          fi

          run_uat="$candidate/Engine/Build/BatchFiles/RunUAT.sh"
          [[ -x "$run_uat" ]] || { echo "RunUAT.sh not found: $run_uat" >&2; exit 1; }
          echo "run_uat=$run_uat" >> "$GITHUB_OUTPUT"

      - name: Package LOOMLE Release (Mac)
        id: package
        timeout-minutes: 25
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          package_dir="$RUNNER_TEMP/LoomleBridge_Release_Darwin"
          bundle_dir="$RUNNER_TEMP/loomle-release-bundle-darwin"
          release_dir="$RUNNER_TEMP/loomle-release-assets-darwin"
          archive_path="$release_dir/loomle-darwin.zip"
          manifest_path="$release_dir/loomle-manifest-darwin.json"

          plugin="$GITHUB_WORKSPACE/engine/LoomleBridge/LoomleBridge.uplugin"
          [[ -f "$plugin" ]] || { echo "Plugin descriptor not found: $plugin" >&2; exit 1; }
          rm -rf "$package_dir" "$bundle_dir" "$release_dir"
          "${{ steps.ue_root_mac.outputs.run_uat }}" BuildPlugin \
            -Plugin="$plugin" \
            -Package="$package_dir" \
            -TargetPlatforms=Mac \
            -Rocket

          cd "$GITHUB_WORKSPACE/client"
          cargo build --release

          client_src="$GITHUB_WORKSPACE/client/target/release/loomle"
          [[ -x "$client_src" ]] || { echo "LOOMLE client binary missing or not executable: $client_src" >&2; exit 1; }

          mkdir -p "$bundle_dir/plugin-cache/LoomleBridge" "$release_dir"
          client_relpath="loomle"
          client_dst="$bundle_dir/$client_relpath"

          rsync -a "$package_dir/" "$bundle_dir/plugin-cache/LoomleBridge/"
          cp "$client_src" "$client_dst"
          chmod +x "$client_dst"

          python3 "$GITHUB_WORKSPACE/packaging/release/write_bundle_zip.py" \
            --bundle-dir "$bundle_dir" \
            --archive-path "$archive_path"

          package_sha="$(shasum -a 256 "$archive_path" | awk '{print tolower($1)}')"
          client_sha="$(shasum -a 256 "$client_dst" | awk '{print tolower($1)}')"
          asset_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/loomle-darwin.zip"

          python3 "$GITHUB_WORKSPACE/packaging/bundle/build_release_manifest.py" \
            --manifest-path "$manifest_path" \
            --version "$version" \
            --platform darwin \
            --asset-url "$asset_url" \
            --sha256 "$package_sha" \
            --client-binary-relpath "$client_relpath" \
            --client-sha256 "$client_sha"

          {
            echo "archive_path=$archive_path"
            echo "manifest_path=$manifest_path"
          } >> "$GITHUB_OUTPUT"

      - name: Publish Tag Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --latest=false \
              --generate-notes
          fi

          gh release upload "$tag" \
            "${{ steps.package.outputs.archive_path }}" \
            "${{ steps.package.outputs.manifest_path }}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
