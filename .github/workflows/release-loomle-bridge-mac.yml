name: Release Loomle Plugin (Mac)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-plugin-mac:
    runs-on: [self-hosted, macOS]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Unreal Engine Root (Mac)
        id: ue_root_mac
        shell: bash
        env:
          UE_FROM_VARS: ${{ vars.UE_5_7_ROOT_MAC }}
        run: |
          set -euo pipefail
          candidate=""
          if [[ -n "${UE_FROM_VARS:-}" ]]; then
            candidate="$UE_FROM_VARS"
          elif [[ -n "${UE_5_7_ROOT_MAC:-}" ]]; then
            candidate="$UE_5_7_ROOT_MAC"
          else
            candidate="/Users/Shared/Epic Games/UE_5.7"
          fi

          run_uat="$candidate/Engine/Build/BatchFiles/RunUAT.sh"
          if [[ ! -x "$run_uat" ]]; then
            echo "RunUAT.sh not found. Set UE_5_7_ROOT_MAC (repo var or runner env). Tried: $run_uat" >&2
            exit 1
          fi

          {
            echo "ue_root=$candidate"
            echo "run_uat=$run_uat"
            echo "ue_app=$candidate/Engine/Binaries/Mac/UnrealEditor.app"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Test Project Root
        id: test_project
        shell: bash
        env:
          TEST_ROOT_FROM_VARS: ${{ vars.LOOMLE_TEST_PROJECT_ROOT_MAC }}
        run: |
          set -euo pipefail
          test_root=""
          if [[ -n "${TEST_ROOT_FROM_VARS:-}" ]]; then
            test_root="$TEST_ROOT_FROM_VARS"
          elif [[ -n "${LOOMLE_TEST_PROJECT_ROOT_MAC:-}" ]]; then
            test_root="$LOOMLE_TEST_PROJECT_ROOT_MAC"
          else
            test_root="/Users/xartest/Documents/UnrealProjects/Loombed"
          fi

          [[ -d "$test_root" ]] || { echo "Test project root not found: $test_root" >&2; exit 1; }
          uproject="$(find "$test_root" -maxdepth 1 -type f -name '*.uproject' | head -n 1)"
          [[ -n "$uproject" ]] || { echo "No .uproject found under $test_root" >&2; exit 1; }
          socket="$test_root/Intermediate/loomle.sock"

          {
            echo "test_root=$test_root"
            echo "uproject=$uproject"
            echo "socket=$socket"
          } >> "$GITHUB_OUTPUT"

      - name: Run Rust Unit Tests
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/mcp_server"
          cargo test

      - name: Build Plugin From Current Commit And Sync To Test Project
        shell: bash
        run: |
          set -euo pipefail
          plugin="$GITHUB_WORKSPACE/LoomleBridge.uplugin"
          [[ -f "$plugin" ]] || { echo "Plugin descriptor not found: $plugin" >&2; exit 1; }

          package_dir="$RUNNER_TEMP/LoomleBridge_Gating"
          plugin_dst="${{ steps.test_project.outputs.test_root }}/Plugins/LoomleBridge"
          rm -rf "$package_dir"

          "${{ steps.ue_root_mac.outputs.run_uat }}" BuildPlugin \
            -Plugin="$plugin" \
            -Package="$package_dir" \
            -TargetPlatforms=Mac \
            -Rocket

          mkdir -p "$plugin_dst"
          rsync -a --delete "$package_dir"/ "$plugin_dst"/

      - name: Build MCP Server Binary (Release) And Sync To Test Project Plugin
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/mcp_server"
          cargo build --release

          server_src="$GITHUB_WORKSPACE/mcp_server/target/release/loomle_mcp_server"
          [[ -x "$server_src" ]] || { echo "MCP server binary missing or not executable: $server_src" >&2; exit 1; }

          plugin_server="${{ steps.test_project.outputs.test_root }}/Plugins/LoomleBridge/Tools/mcp/darwin/loomle_mcp_server"
          mkdir -p "$(dirname "$plugin_server")"
          cp "$server_src" "$plugin_server"
          chmod +x "$plugin_server"

      - name: Restart Unreal Editor For Release Gating
        shell: bash
        run: |
          set -euo pipefail
          pkill -f "UnrealEditor.*${{ steps.test_project.outputs.uproject }}" || true
          sleep 2
          open -na "${{ steps.ue_root_mac.outputs.ue_app }}" --args "${{ steps.test_project.outputs.uproject }}"

      - name: Wait For Bridge Socket
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' "${{ steps.test_project.outputs.socket }}"
          import os
          import socket
          import sys
          import time

          sock = sys.argv[1]
          deadline = time.time() + 240
          while time.time() < deadline:
              if os.path.exists(sock):
                  try:
                      s = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
                      s.settimeout(0.5)
                      s.connect(sock)
                      s.close()
                      print("READY")
                      raise SystemExit(0)
                  except Exception:
                      pass
              time.sleep(1)
          print(f"TIMEOUT waiting for socket: {sock}")
          raise SystemExit(1)
          PY

      - name: Run Smoke Integration Test
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_bridge_smoke.py \
            --project-root "${{ steps.test_project.outputs.test_root }}"

      - name: Run Regression Integration Test
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          python3 tools/test_bridge_regression.py \
            --project-root "${{ steps.test_project.outputs.test_root }}"

      - name: Stop Unreal Editor After Gating
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          pkill -f "UnrealEditor.*${{ steps.test_project.outputs.uproject }}" || true

      - name: Build and Package Plugin (Mac)
        id: package
        shell: bash
        run: |
          set -euo pipefail

          plugin="$GITHUB_WORKSPACE/LoomleBridge.uplugin"
          [[ -f "$plugin" ]] || { echo "Plugin descriptor not found: $plugin" >&2; exit 1; }

          package_dir="$RUNNER_TEMP/LoomleBridge_Mac"
          stage_dir="$RUNNER_TEMP/release-stage"
          release_dir="$RUNNER_TEMP/release-assets"
          zip_path="$release_dir/loomle-bridge-darwin.zip"
          manifest_path="$release_dir/loomle-bridge-manifest.json"

          rm -rf "$package_dir" "$stage_dir" "$release_dir"
          mkdir -p "$stage_dir" "$release_dir"

          "${{ steps.ue_root_mac.outputs.run_uat }}" BuildPlugin \
            -Plugin="$plugin" \
            -Package="$package_dir" \
            -TargetPlatforms=Mac \
            -Rocket

          server_src="$GITHUB_WORKSPACE/mcp_server/target/release/loomle_mcp_server"
          [[ -x "$server_src" ]] || { echo "MCP server binary missing or not executable: $server_src" >&2; exit 1; }
          server_relpath="Tools/mcp/darwin/loomle_mcp_server"
          server_dst="$package_dir/$server_relpath"
          mkdir -p "$(dirname "$server_dst")"
          cp "$server_src" "$server_dst"
          chmod +x "$server_dst"
          server_sha256="$(shasum -a 256 "$server_dst" | awk '{print tolower($1)}')"

          cat > "$package_dir/build-metadata.json" <<JSON
          {
            "platform": "darwin",
            "built_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "ue_root": "${{ steps.ue_root_mac.outputs.ue_root }}",
            "commit": "${{ github.sha }}",
            "runner": "${{ runner.name }}"
          }
          JSON

          mkdir -p "$stage_dir/LoomleBridge"
          cp -R "$package_dir"/. "$stage_dir/LoomleBridge"/

          (
            cd "$stage_dir"
            zip -r "$zip_path" LoomleBridge
          )

          sha256="$(shasum -a 256 "$zip_path" | awk '{print tolower($1)}')"
          tag="${GITHUB_REF_NAME#v}"
          asset_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/loomle-bridge-darwin.zip"

          python3 - <<'PY' "$manifest_path" "$tag" "$asset_url" "$sha256" "$server_relpath" "$server_sha256"
          import json
          import pathlib
          import sys

          manifest_path = pathlib.Path(sys.argv[1])
          version = sys.argv[2]
          asset_url = sys.argv[3]
          sha256 = sys.argv[4]
          server_relpath = sys.argv[5]
          server_sha256 = sys.argv[6]

          manifest = {
              "latest": version,
              "versions": {
                  version: {
                      "packages": {
                          "darwin": {
                              "url": asset_url,
                              "sha256": sha256,
                              "format": "zip",
                              "server_binary_relpath": server_relpath,
                              "server_sha256": server_sha256,
                          }
                      }
                  }
              },
          }
          manifest_path.write_text(json.dumps(manifest, indent=2) + "\n")
          PY

          {
            echo "zip_path=$zip_path"
            echo "manifest_path=$manifest_path"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release (Plugin)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.manifest_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          make_latest: true

      - name: Update Stable Alias Release (bridge-latest)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          zip_path="${{ steps.package.outputs.zip_path }}"
          manifest_path="${{ steps.package.outputs.manifest_path }}"

          if ! gh release view bridge-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create bridge-latest \
              --repo "$GITHUB_REPOSITORY" \
              --title "Bridge Latest" \
              --notes "Stable alias release for latest loomle bridge package and manifest." \
              "$zip_path" \
              "$manifest_path"
          else
            gh release upload bridge-latest "$zip_path" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release upload bridge-latest "$manifest_path" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi
