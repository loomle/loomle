name: Release LOOMLE (Mac)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: loomle-release-mac-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify-mac:
    uses: ./.github/workflows/release-verify-mac.yml
    secrets: inherit

  release-mac:
    needs: verify-mac
    runs-on: [self-hosted, macOS]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Verify Release Inputs
        uses: actions/download-artifact@v4
        with:
          name: release-verify-mac-inputs
          path: ${{ runner.temp }}/loomle-release-inputs-darwin

      - name: Ensure Tag Commit Is On Main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          tag_commit="$(git rev-parse HEAD)"
          git merge-base --is-ancestor "$tag_commit" origin/main || {
            echo "Release tag commit $tag_commit is not reachable from origin/main" >&2
            exit 1
          }

      - name: Package LOOMLE Release (Mac)
        id: package
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          inputs_dir="$RUNNER_TEMP/loomle-release-inputs-darwin"
          bundle_dir="$RUNNER_TEMP/loomle-release-bundle-darwin"
          release_dir="$RUNNER_TEMP/loomle-release-assets-darwin"
          archive_path="$release_dir/loomle-darwin.zip"
          manifest_path="$release_dir/loomle-manifest-darwin.json"

          if [[ -d "$inputs_dir/release-verify-mac-inputs" ]]; then
            inputs_dir="$inputs_dir/release-verify-mac-inputs"
          fi

          rm -rf "$bundle_dir" "$release_dir"
          mkdir -p "$bundle_dir/plugin/LoomleBridge" "$bundle_dir/Loomle" "$release_dir"
          [[ -d "$inputs_dir/plugin/LoomleBridge" ]] || { echo "Verify plugin inputs missing: $inputs_dir/plugin/LoomleBridge" >&2; exit 1; }
          [[ -d "$inputs_dir/loomle/Loomle" ]] || { echo "Verify Loomle inputs missing: $inputs_dir/loomle/Loomle" >&2; exit 1; }
          [[ -f "$inputs_dir/client/darwin/loomle" ]] || { echo "Verify client inputs missing: $inputs_dir/client/darwin/loomle" >&2; exit 1; }

          client_relpath="Loomle/loomle"
          client_dst="$bundle_dir/$client_relpath"

          rsync -a "$inputs_dir/plugin/LoomleBridge/" "$bundle_dir/plugin/LoomleBridge/"
          rsync -a "$inputs_dir/loomle/Loomle/" "$bundle_dir/Loomle/"
          mkdir -p "$bundle_dir/client/darwin"
          cp "$inputs_dir/client/darwin/loomle" "$bundle_dir/client/darwin/loomle"
          chmod +x \
            "$bundle_dir/client/darwin/loomle" \
            "$bundle_dir/$client_relpath"

          (
            cd "$bundle_dir"
            zip -r "$archive_path" .
          )

          package_sha="$(shasum -a 256 "$archive_path" | awk '{print tolower($1)}')"
          client_sha="$(shasum -a 256 "$client_dst" | awk '{print tolower($1)}')"
          asset_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/loomle-darwin.zip"

          python3 "$GITHUB_WORKSPACE/packaging/bundle/build_release_manifest.py" \
            --manifest-path "$manifest_path" \
            --version "$version" \
            --platform darwin \
            --asset-url "$asset_url" \
            --sha256 "$package_sha" \
            --client-binary-relpath "$client_relpath" \
            --client-sha256 "$client_sha"

          {
            echo "archive_path=$archive_path"
            echo "manifest_path=$manifest_path"
          } >> "$GITHUB_OUTPUT"

      - name: Publish Tag Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive_path }}
            ${{ steps.package.outputs.manifest_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
