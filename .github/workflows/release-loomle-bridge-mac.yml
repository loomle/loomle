name: Release LOOMLE (Mac)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: loomle-release-mac-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify-mac:
    uses: ./.github/workflows/release-verify-mac.yml
    secrets: inherit

  release-mac:
    needs: verify-mac
    runs-on: [self-hosted, macOS]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure Tag Commit Is On Main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          tag_commit="$(git rev-parse HEAD)"
          git merge-base --is-ancestor "$tag_commit" origin/main || {
            echo "Release tag commit $tag_commit is not reachable from origin/main" >&2
            exit 1
          }

      - name: Resolve Unreal Engine Root (Mac)
        id: ue_root_mac
        shell: bash
        env:
          UE_FROM_VARS: ${{ vars.UE_5_7_ROOT_MAC }}
        run: |
          set -euo pipefail
          candidate=""
          if [[ -n "${UE_FROM_VARS:-}" ]]; then
            candidate="$UE_FROM_VARS"
          elif [[ -n "${UE_5_7_ROOT_MAC:-}" ]]; then
            candidate="$UE_5_7_ROOT_MAC"
          else
            candidate="/Users/Shared/Epic Games/UE_5.7"
          fi

          run_uat="$candidate/Engine/Build/BatchFiles/RunUAT.sh"
          if [[ ! -x "$run_uat" ]]; then
            echo "RunUAT.sh not found. Set UE_5_7_ROOT_MAC (repo var or runner env). Tried: $run_uat" >&2
            exit 1
          fi

          {
            echo "ue_root=$candidate"
            echo "run_uat=$run_uat"
          } >> "$GITHUB_OUTPUT"

      - name: Build Rust Binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --manifest-path "$GITHUB_WORKSPACE/mcp/server/Cargo.toml"
          cargo build --release --manifest-path "$GITHUB_WORKSPACE/mcp/client/Cargo.toml"

      - name: Package LOOMLE Release (Mac)
        id: package
        shell: bash
        run: |
          set -euo pipefail

          plugin="$GITHUB_WORKSPACE/engine/LoomleBridge/LoomleBridge.uplugin"
          [[ -f "$plugin" ]] || { echo "Plugin descriptor not found: $plugin" >&2; exit 1; }

          version="${GITHUB_REF_NAME#v}"
          package_dir="$RUNNER_TEMP/LoomleBridge_Mac"
          bundle_dir="$RUNNER_TEMP/loomle-release-bundle-darwin"
          release_dir="$RUNNER_TEMP/loomle-release-assets-darwin"
          archive_path="$release_dir/loomle-darwin.zip"
          manifest_path="$release_dir/loomle-manifest-darwin.json"
          bootstrap_cli_path="$release_dir/loomle-darwin"

          rm -rf "$package_dir" "$bundle_dir" "$release_dir"
          mkdir -p "$bundle_dir/plugin/LoomleBridge" "$bundle_dir/workspace" "$release_dir"

          "${{ steps.ue_root_mac.outputs.run_uat }}" BuildPlugin \
            -Plugin="$plugin" \
            -Package="$package_dir" \
            -TargetPlatforms=Mac \
            -Rocket

          rsync -a "$package_dir"/ "$bundle_dir/plugin/LoomleBridge"/

          server_src="$GITHUB_WORKSPACE/mcp/server/target/release/loomle_mcp_server"
          client_src="$GITHUB_WORKSPACE/mcp/client/target/release/loomle"
          [[ -x "$server_src" ]] || { echo "Server binary missing: $server_src" >&2; exit 1; }
          [[ -x "$client_src" ]] || { echo "Client binary missing: $client_src" >&2; exit 1; }

          server_relpath="plugin/LoomleBridge/Tools/mcp/darwin/loomle_mcp_server"
          client_relpath="workspace/Loomle/client/loomle"
          server_dst="$bundle_dir/$server_relpath"
          client_dst="$bundle_dir/$client_relpath"

          mkdir -p "$(dirname "$server_dst")" "$(dirname "$client_dst")" "$bundle_dir/mcp/client/darwin"
          cp "$server_src" "$server_dst"
          chmod +x "$server_dst"
          rsync -a "$GITHUB_WORKSPACE/workspace/Loomle/" "$bundle_dir/workspace/Loomle/"
          cp "$client_src" "$client_dst"
          cp "$client_src" "$bundle_dir/mcp/client/darwin/loomle"
          chmod +x "$client_dst" "$bundle_dir/mcp/client/darwin/loomle"

          cp "$client_src" "$bootstrap_cli_path"
          chmod +x "$bootstrap_cli_path"

          (
            cd "$bundle_dir"
            zip -r "$archive_path" .
          )

          package_sha="$(shasum -a 256 "$archive_path" | awk '{print tolower($1)}')"
          server_sha="$(shasum -a 256 "$server_dst" | awk '{print tolower($1)}')"
          client_sha="$(shasum -a 256 "$client_dst" | awk '{print tolower($1)}')"
          asset_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/loomle-darwin.zip"

          python3 "$GITHUB_WORKSPACE/packaging/bundle/build_release_manifest.py" \
            --manifest-path "$manifest_path" \
            --version "$version" \
            --platform darwin \
            --asset-url "$asset_url" \
            --sha256 "$package_sha" \
            --server-binary-relpath "$server_relpath" \
            --server-sha256 "$server_sha" \
            --client-binary-relpath "$client_relpath" \
            --client-sha256 "$client_sha"

          {
            echo "archive_path=$archive_path"
            echo "manifest_path=$manifest_path"
            echo "bootstrap_cli_path=$bootstrap_cli_path"
          } >> "$GITHUB_OUTPUT"

      - name: Publish Tag Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive_path }}
            ${{ steps.package.outputs.manifest_path }}
            ${{ steps.package.outputs.bootstrap_cli_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
