name: First user feedback
description: Share what happened when you tried LOOMLE with an Unreal project.
title: "[Feedback] "
labels:
  - feedback
body:
  - type: markdown
    attributes:
      value: |
        Thanks for trying LOOMLE. The most useful feedback is concrete: what you tried, where it worked, and where it became unclear or failed.
  - type: textarea
    id: goal
    attributes:
      label: What were you trying to do?
      description: Example: inspect a Blueprint, follow an execution flow, query references, or patch a Widget tree.
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: What happened?
      description: Include the first confusing step, error message, or successful operation.
    validations:
      required: true
  - type: input
    id: host
    attributes:
      label: MCP host
      description: Codex, Claude, another MCP host, or direct client testing.
  - type: input
    id: unreal
    attributes:
      label: Unreal Engine version
      description: Example: UE 5.7.
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste the SAL request, tool result, compiler diagnostics, or relevant Unreal log lines.
      render: text
